<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Order Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        .header { background: var(--brown); color: white; text-align: center; padding: 15px; border-bottom: 3px solid var(--gold); }
        .logo-text { font-size: 24px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        .sub-header { font-size: 12px; letter-spacing: 4px; color: var(--gold); }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid var(--gold); border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .flow-container { display: flex; gap: 4px; margin: 12px 0; overflow-x: auto; }
        .step { background: #e0e0e0; padding: 6px 4px; border-radius: 4px; font-size: 8px; font-weight: bold; color: #777; flex: 1; text-align: center; }
        .step.active { background: var(--gold); color: white; }

        #formCanvas { background: white; width: 600px; height: 600px; padding: 25px; position: fixed; left: -5000px; border: 15px solid var(--gold); display: flex; flex-direction: column; box-sizing: border-box; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; flex-grow: 1; max-height: 350px; }
        .grid-container img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; border: 1.5px solid #eee; }

        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: white; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-out { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 8px; font-size: 12px; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 25px 2px; font-size: 9px; color: #999; font-weight: bold; text-transform: uppercase; line-height: 1.2; display: flex; align-items: center; justify-content: center; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); background: #fffcf5; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">SHANTI JEWEL</div>
    <div class="sub-header">ORDER PORTAL</div>
</div>

<div id="addPage" class="page active">
    <div class="card">
        <div style="border:2px dashed #ccc; padding:25px; text-align:center; border-radius:10px; cursor:pointer;" onclick="document.getElementById('fIn').click()">
            <span id="upMsg" style="font-weight:bold;">TAP TO UPLOAD (UP TO 4 IMAGES)</span>
            <div id="pv" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:5px; margin-top:15px;"></div>
        </div>
        <input type="file" id="fIn" multiple accept="image/*" style="display:none" onchange="processPhotos(event)">
        
        <input type="text" id="i_id" placeholder="Order Number">
        
        <select id="i_pa">
            <option value="">Select Party Name</option>
            <option value="P.N.GADGIL & SONS LTD.">P.N.GADGIL & SONS LTD.</option>
            <option value="PNG BROTHERS">PNG BROTHERS</option>
            <option value="ANNAPURNA GOLD">ANNAPURNA GOLD</option>
            <option value="NEELKANTH JEWELLERS">NEELKANTH JEWELLERS</option>
            <option value="INHOUSE">INHOUSE</option>
        </select>

        <div style="display:flex; gap:10px;">
            <input type="number" step="0.001" id="i_wt" placeholder="Weight" onblur="formatWeight(this)" onfocus="this.type='number'">
            <input type="number" id="i_sz" placeholder="Size" onblur="formatSize(this)" onfocus="this.type='number'">
        </div>

        <input type="date" id="i_dd" title="Delivery Date">
        <select id="i_cad">
            <option value="">Select CAD Worker</option>
            <option value="DYE">DYE</option>
            <option value="CHETAN SHINDE">CHETAN SHINDE</option>
            <option value="ALAUDDIN">ALAUDDIN</option>
        </select>
        <textarea id="i_sp" rows="3" placeholder="Production Instructions"></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">PROCESS ORDER</button>
    </div>
</div>

<div id="listPage" class="page"><div id="mainList"></div></div>

<div id="infoPage" class="page">
    <input type="text" class="search-box" id="searchIn" placeholder="Search Current Orders..." onkeyup="filterOrders()">
    <div id="currentInfoList"></div>
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ddd;">
    <div style="text-align:center;"><button class="btn" style="background:#fff; color:#f44336; border:1px solid #f44336; width:auto; font-size:10px; padding: 10px 20px;" onclick="wipeDatabase()">WIPE ENTIRE DATABASE</button></div>
</div>

<div id="pastPage" class="page">
    <div style="text-align:center; padding:10px; color:var(--brown); font-weight:bold;">COMPLETED ORDERS (Past 31 Days)</div>
    <div id="pastList"></div>
</div>

<div id="formCanvas">
    <div style="text-align:center; border-bottom:4px solid var(--brown); padding-bottom:10px;">
        <h1 style="color:var(--brown); margin:0; font-size:42px;">SHANTI JEWEL</h1>
        <p style="letter-spacing:12px; margin:5px 0; color:var(--gold); font-weight:bold; font-size:16px;">ORDER FORM</p>
    </div>
    <div id="c_imgs" class="grid-container"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:22px; border-top:2px solid #eee; padding-top:12px;">
        <div><b>CAD:</b> <span id="c_cad"></span></div>
        <div><b>WT:</b> <span id="c_wt"></span></div>
        <div style="grid-column: span 2;"><b>SIZE:</b> <span id="c_sz"></span></div>
    </div>
    <div style="margin-top:10px; border:1px solid #ddd; padding:12px; border-radius:8px; background:#f9f9f9; font-size:20px; flex-grow:1;">
        <b>NOTES:</b> <span id="c_sp"></span>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">PUNCH</div>
    <div class="tab" onclick="nav('list', this)">PRODUCTION</div>
    <div class="tab" onclick="nav('info', this)">CURRENT ORDERS</div>
    <div class="tab" onclick="nav('past', this)">PAST ORDERS</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const depts = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];
    let photos = [];

    function formatWeight(el) { if (el.value) { let val = parseFloat(el.value); el.type = "text"; el.value = val.toFixed(3) + "gms"; } }
    function formatSize(el) { if (el.value) { let val = el.value; el.type = "text"; el.value = val + "NO."; } }

    function processPhotos(e) {
        const files = Array.from(e.target.files).slice(0, 4);
        photos = []; document.getElementById('pv').innerHTML = "";
        files.forEach(f => {
            const r = new FileReader();
            r.onload = ev => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 400; canvas.height = 400;
                    canvas.getContext('2d').drawImage(img,0,0,400,400);
                    const res = canvas.toDataURL("image/jpeg", 0.6);
                    photos.push(res);
                    document.getElementById('pv').innerHTML += `<img src="${res}" style="width:100%; border-radius:4px; border:1px solid var(--gold);">`;
                };
            };
            r.readAsDataURL(f);
        });
        document.getElementById('upMsg').innerText = files.length + " IMAGES SELECTED";
    }

    function saveOrder() {
        const id = document.getElementById('i_id').value;
        if(!id || photos.length === 0) return alert("Order ID and Photos required");
        db.ref('orders/' + id).set({
            id: id, party: document.getElementById('i_pa').value || "-",
            weight: document.getElementById('i_wt').value || "0",
            size: document.getElementById('i_sz').value || "-",
            dueDate: document.getElementById('i_dd').value || "9999-12-31",
            cadWorker: document.getElementById('i_cad').value || "-",
            specs: document.getElementById('i_sp').value || "None",
            imgs: photos, status: "CAD", ts: Date.now()
        }).then(() => {
            alert("✅ SUCCESS: Order #" + id + " Punched!");
            location.reload();
        });
    }

    function nav(p, el) {
        document.querySelectorAll('.page, .tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p !== 'add') loadOrders();
    }

    function loadOrders() {
        db.ref('orders').on('value', s => {
            const sList = document.getElementById('mainList');
            const cList = document.getElementById('currentInfoList');
            const pList = document.getElementById('pastList');
            sList.innerHTML = ""; cList.innerHTML = ""; pList.innerHTML = "";
            
            const data = Object.values(s.val() || {}).sort((a,b) => b.ts - a.ts);
            const now = Date.now();
            const wipeLimit = 31 * 24 * 60 * 60 * 1000;

            data.forEach(o => {
                // Auto-wipe PAST orders older than 31 days
                if(o.status === "READY" && (now - o.ts) > wipeLimit) {
                    db.ref('orders/' + o.id).remove();
                    return;
                }

                const cur = o.status || "CAD";
                let steps = depts.map(d => `<div class="step ${cur === d ? 'active' : ''}">${d}</div>`).join('');
                let itemCard = `
                <div class="card">
                    <div style="display:flex; gap:12px;">
                        <img src="${o.imgs[0]}" style="width:70px; height:70px; object-fit:cover; border-radius:8px;">
                        <div style="flex:1"><b>${o.id}</b> - ${o.party}<br><small>Due: ${o.dueDate}</small></div>
                    </div>
                    <div class="flow-container">${steps}</div>`;

                if(cur !== "READY") {
                    // Current active production
                    sList.innerHTML += itemCard + `<button class="btn btn-out" onclick="moveNext('${o.id}', '${cur}')">MOVE TO NEXT STAGE</button><button class="btn btn-out" style="color:green; border-color:green;" onclick="downloadForm('${o.id}')">CAD ORDER FORM</button></div>`;
                    
                    cList.innerHTML += `<div class="card order-item" data-id="${o.id}"><div style="display:flex; gap:15px;"><img src="${o.imgs[0]}" style="width:90px; height:90px; object-fit:cover; border-radius:8px;"><div style="flex:1"><b>${o.id}</b> | ${o.party}<br><b>Wt:</b> ${o.weight} | <b>Size:</b> ${o.size}<br><b>Stage:</b> ${o.status}</div></div></div>`;
                } else {
                    // Completed orders
                    pList.innerHTML += itemCard + `<div style="color:green; font-weight:bold; text-align:center; border:1.5px solid green; border-radius:8px; padding:10px; margin-top:5px;">✅ COMPLETED</div></div>`;
                }
            });
            window.activeData = data;
        });
    }

    function moveNext(id, cur) {
        const idx = depts.indexOf(cur);
        if(idx < depts.length - 1) {
            const nextDept = depts[idx + 1];
            db.ref('orders/' + id).update({ status: nextDept, ts: Date.now() }).then(() => {
                alert("🚀 Order #" + id + " moved to " + nextDept);
            });
        }
    }

    function downloadForm(id) {
        const o = window.activeData.find(x => x.id === id);
        if(!o) return;
        document.getElementById('c_cad').innerText = o.cadWorker;
        document.getElementById('c_wt').innerText = o.weight;
        document.getElementById('c_sz').innerText = o.size;
        document.getElementById('c_sp').innerText = o.specs;
        document.getElementById('c_imgs').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');
        
        setTimeout(() => {
            html2canvas(document.querySelector("#formCanvas"), { scale: 2 }).then(canvas => {
                const imageData = canvas.toDataURL("image/jpeg", 0.9);
                const newWindow = window.open();
                if(newWindow) {
                    newWindow.document.write(`<body style="margin:0; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center;"><img src="${imageData}" style="width:100%;"><div style="padding:20px; color:white; text-align:center; font-family:sans-serif;"><h3>FORM READY</h3><p>Long-press image to Save.</p><button onclick="window.close()" style="padding:10px 20px; background:var(--gold); color:white; border:none; border-radius:5px;">BACK</button></div></body>`);
                }
            });
        }, 800);
    }

    function filterOrders() {
        const val = document.getElementById('searchIn').value.toLowerCase();
        document.querySelectorAll('.order-item').forEach(item => {
            const id = item.getAttribute('data-id').toLowerCase();
            item.style.display = id.includes(val) ? "block" : "none";
        });
    }

    function wipeDatabase() {
        if(prompt("Admin Password:") === "2215") {
            if(confirm("⚠️ Delete ALL data?")) {
                db.ref('orders').remove().then(() => {
                    alert("🗑️ DATABASE WIPED.");
                    location.reload();
                });
            }
        }
    }
</script>
</body>
</html>
