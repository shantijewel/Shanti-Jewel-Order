<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel ERP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        .header { background: var(--brown); color: white; text-align: center; padding: 18px; font-weight: bold; font-size: 20px; letter-spacing: 1px; border-bottom: 3px solid var(--gold); }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .info-label { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; }
        .arrow-container { display: flex; gap: 5px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; }
        .step { background: #e0e0e0; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; color: #777; white-space: nowrap; }
        .step.active { background: var(--gold); color: white; }
        #cadCanvas { background: white; width: 600px; padding: 40px; position: fixed; left: -5000px; border: 15px solid var(--gold); }
        .cad-imgs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .cad-imgs img { height: 200px; width: 200px; object-fit: cover; border-radius: 10px; border: 2px solid var(--gold); }
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-outline { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 5px; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 25px 5px; font-size: 12px; color: #999; font-weight: bold; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); background: #fffcf5; }
    </style>
</head>
<body>

<div class="header">SHANTI JEWEL</div>

<div id="addPage" class="page active">
    <div class="card">
        <div id="uploadArea" style="border:2px dashed var(--gold); padding:30px; text-align:center; border-radius:10px; cursor: pointer;" onclick="document.getElementById('fileInput').click()">
            <span id="upMsg" style="color:var(--brown); font-weight:bold;">📸 TAP TO ADD DESIGN PHOTOS</span>
            <div id="previews" style="display:flex; gap:8px; justify-content:center; margin-top:15px;"></div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="compressAndPreview(event)">
        
        <input type="text" id="orderId" placeholder="Order Number (Required)">
        <input type="text" id="party" placeholder="Party Name">
        <div style="display:flex; gap:10px;">
            <input type="text" id="weight" placeholder="Gross Wt (g)">
            <input type="text" id="size" placeholder="Size">
        </div>
        <input type="date" id="delDate">
        <textarea id="specs" rows="3" placeholder="Additional Specifications..."></textarea>
        <button class="btn btn-gold" onclick="saveToFirebase()">PUNCH ORDER</button>
    </div>
</div>

<div id="statusPage" class="page">
    <div id="statusList"></div>
</div>

<div id="infoPage" class="page">
    <div id="fullInfoList"></div>
</div>

<div id="cadCanvas">
    <div style="text-align:center; border-bottom:6px solid var(--brown); padding-bottom:15px; margin-bottom: 20px;">
        <h1 style="color:var(--brown); margin:0; font-size:50px; font-family: serif;">SHANTI JEWEL</h1>
        <p style="letter-spacing:15px; margin:10px 0; font-weight:bold; color: var(--gold);">PRODUCTION ORDER FORM</p>
    </div>
    <div id="cadImgContainer" class="cad-imgs"></div>
    <div style="font-size:30px; line-height:2.0; color: #333;">
        <div style="border-bottom: 1px solid #eee;"><b>Order ID:</b> #<span id="cId"></span></div>
        <div style="border-bottom: 1px solid #eee;"><b>Customer:</b> <span id="cParty"></span></div>
        <div style="border-bottom: 1px solid #eee;"><b>Weight:</b> <span id="cWt"></span>g | <b>Size:</b> <span id="cSz"></span></div>
        <div style="border-bottom: 1px solid #eee;"><b>Delivery:</b> <span id="cDate"></span></div>
        <div style="margin-top:20px;"><b>Instructions:</b></div>
        <div id="cSpecs" style="background:#f9f9f9; padding:20px; border: 2px solid #eee; border-radius:10px; min-height: 100px;"></div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">NEW</div>
    <div class="tab" onclick="nav('status', this)">WORKFLOW</div>
    <div class="tab" onclick="nav('info', this)">ALL ORDERS</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentImages = [];
    const deptFlow = ["CAD", "CAM", "CASTING", "POLISHING", "HUID", "READY"];

    // COMPRESSION LOGIC ADDED HERE
    function compressAndPreview(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        currentImages = [];
        const container = document.getElementById('previews');
        container.innerHTML = "";

        files.forEach(file => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.drawImage(img, 0, 0, width, height);
                    const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7); // 70% Quality
                    
                    currentImages.push(compressedBase64);
                    container.innerHTML += `<img src="${compressedBase64}" style="width:60px; height:60px; border-radius:5px; object-fit:cover; border:1px solid var(--gold);">`;
                };
            };
        });
        document.getElementById('upMsg').innerText = files.length + " Photos Selected";
    }

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        el.classList.add('active');
        if(page === 'status' || page === 'info') loadOrders();
    }

    function saveToFirebase() {
        const id = document.getElementById('orderId').value;
        if(!id || currentImages.length === 0) return alert("Order Number and at least 1 Photo are required!");
        
        db.ref('orders/' + id).set({
            id, 
            party: document.getElementById('party').value || "-",
            weight: document.getElementById('weight').value || "0",
            size: document.getElementById('size').value || "-",
            date: document.getElementById('delDate').value || "-",
            specs: document.getElementById('specs').value || "No special instructions",
            imgs: currentImages,
            status: "CAD",
            time: Date.now()
        }).then(() => { alert("Order Saved Successfully!"); location.reload(); });
    }

    function loadOrders() {
        db.ref('orders').on('value', (snap) => {
            const data = snap.val();
            const sList = document.getElementById('statusList');
            const iList = document.getElementById('fullInfoList');
            sList.innerHTML = ""; iList.innerHTML = "";
            if(!data) return;

            const orders = Object.values(data).sort((a, b) => b.time - a.time);

            orders.forEach(o => {
                // Workflow List
                let steps = deptFlow.map(s => `<div class="step ${o.status === s ? 'active' : ''}">${s}</div>`).join('');
                sList.innerHTML += `
                <div class="card">
                    <div style="display:flex; gap:12px; margin-bottom:12px;">
                        <img src="${o.imgs[0]}" style="width:80px; height:80px; border-radius:8px; object-fit:cover; border:1px solid #ddd;">
                        <div style="flex:1">
                            <b style="font-size:18px;">#${o.id} - ${o.party}</b><br>
                            <small style="color:#666;">Status: <b>${o.status}</b></small><br>
                            <small style="color:var(--gold);">Next: ${deptFlow[deptFlow.indexOf(o.status)+1] || 'Done'}</small>
                        </div>
                    </div>
                    <div class="arrow-container">${steps}</div>
                    <button class="btn btn-outline" style="font-size:13px; margin-top:15px;" onclick="moveNext('${o.id}', '${o.status}')">APPROVE & MOVE TO NEXT DEPT</button>
                    <button class="btn btn-outline" style="border-color:#25D366; color:#25D366;" onclick="makeCADImage('${o.id}')">DOWNLOAD PRODUCTION FORM</button>
                </div>`;

                // Info List
                iList.innerHTML += `
                <div class="card">
                    <div class="info-label">Order Summary</div>
                    <h3 style="margin:5px 0;">#${o.id} | ${o.party}</h3>
                    <p style="font-size:14px; margin:5px 0;"><b>Wt:</b> ${o.weight}g | <b>Size:</b> ${o.size} | <b>Due:</b> ${o.date}</p>
                    <div class="info-label" style="margin-top:10px;">Production Specs</div>
                    <p style="background:#f4f4f4; padding:10px; border-radius:5px; font-size:14px;">${o.specs}</p>
                    <div style="display:flex; gap:8px; overflow-x:auto; margin-top:10px;">
                        ${o.imgs.map(m => `<img src="${m}" style="height:120px; width:120px; object-fit:cover; border-radius:8px; border:1px solid #eee;">`).join('')}
                    </div>
                </div>`;
            });
        });
    }

    function moveNext(id, current) {
        const nextIdx = deptFlow.indexOf(current) + 1;
        if(nextIdx >= deptFlow.length) return alert("Order is already Ready!");
        if(confirm(`Move Order #${id} to ${deptFlow[nextIdx]}?`)) {
            db.ref('orders/' + id).update({status: deptFlow[nextIdx]});
        }
    }

    function makeCADImage(id) {
        db.ref('orders/' + id).once('value', (snap) => {
            const o = snap.val();
            document.getElementById('cId').innerText = o.id;
            document.getElementById('cParty').innerText = o.party;
            document.getElementById('cWt').innerText = o.weight;
            document.getElementById('cSz').innerText = o.size;
            document.getElementById('cDate').innerText = o.date;
            document.getElementById('cSpecs').innerText = o.specs;
            document.getElementById('cadImgContainer').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');

            // Delay slightly for images to render before capture
            setTimeout(() => {
                html2canvas(document.querySelector("#cadCanvas"), { scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `SJ_Production_${o.id}.jpg`;
                    link.href = canvas.toDataURL("image/jpeg", 0.9);
                    link.click();
                    alert("Production Form Generated!");
                });
            }, 500);
        });
    }
</script>
</body>
</html>
