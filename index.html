<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel ERP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #8B735B; --bg: #f4f7f6; --green: #2ecc71; --grey: #bdc3c7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; }
        
        .header { background: var(--brown); color: white; text-align: center; padding: 15px; font-weight: bold; }
        
        /* Progress Line for Pending Orders */
        .progress-line { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; font-size: 9px; font-weight: bold; color: var(--grey); overflow-x: auto; padding-bottom: 5px;}
        .p-step { white-space: nowrap; margin-right: 5px; }
        .p-step.active { color: var(--gold); border-bottom: 2px solid var(--gold); }
        .p-step.done { color: var(--green); }

        /* Multi-Image Slot */
        .upload-slot { border: 2px dashed var(--gold); border-radius: 12px; padding: 20px; text-align: center; background: #fff9e6; }
        .preview-strip { display: flex; gap: 5px; margin-top: 10px; overflow-x: auto; justify-content: center; }
        .preview-strip img { width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .order-item { background: white; border-radius: 12px; padding: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .order-flex { display: flex; gap: 12px; }
        .order-flex img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; }
        
        /* Tab Bar */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 65px; z-index: 1000; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #888; }
        .tab.active { color: var(--gold); border-top: 3px solid var(--gold); }

        .btn-download { background: var(--brown); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* HIDDEN CANVAS FOR IMAGE GENERATION */
        #hidden-form-container { position: absolute; left: -9999px; top: 0; }
        .cad-form-design { width: 400px; background: white; padding: 20px; border: 2px solid var(--gold); }
        .form-logo { font-size: 24px; font-weight: bold; color: var(--brown); text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .form-sub { text-align: center; font-size: 14px; margin: 5px 0 15px 0; letter-spacing: 2px; }
        .form-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 4px;}
        .form-imgs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; }
        .form-imgs img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">SHANTI JEWEL ERP</div>

<div id="addPage" class="page active">
    <div class="card">
        <h3 style="margin-top:0; color:var(--brown)">New Entry</h3>
        <div class="upload-slot" onclick="document.getElementById('imageInput').click()">
            <div id="uploadPlaceholder">📸 <b>TAP TO UPLOAD IMAGES</b></div>
            <div id="imgPreviewStrip" class="preview-strip"></div>
        </div>
        <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="processImages(event)">
        
        <input type="text" id="orderId" placeholder="Order / Bill ID">
        <input type="text" id="party" placeholder="Party Name">
        <div style="display:flex; gap:10px;">
            <input type="text" id="weight" placeholder="Weight">
            <input type="text" id="size" placeholder="Size">
        </div>
        <input type="date" id="dueDate">
        <textarea id="specs" rows="3" placeholder="Special Instructions for CAD/CAM..."></textarea>
        
        <button onclick="saveOrder()" style="background:var(--gold); color:white; border:none; width:100%; padding:15px; margin-top:15px; border-radius:8px; font-weight:bold;">PUNCH ORDER</button>
    </div>
</div>

<div id="listPage" class="page">
    <div id="pendingContainer"></div>
</div>
