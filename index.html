<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Order Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --sj-red: #e53935; --sj-navy: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: white; text-align: center; padding: 10px; border-bottom: 3px solid var(--sj-red); }
        .header img { height: 50px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        .btn-red { background: var(--sj-red); color: white; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .tab { flex: 1; text-align: center; padding: 20px 5px; font-size: 12px; color: #999; }
        .tab.active { color: var(--sj-red); border-top: 4px solid var(--sj-red); }
        
        /* Optimized Order Form for APK */
        #formCanvas { background: white; width: 500px; height: 500px; padding: 20px; position: fixed; left: -10000px; border: 10px solid var(--sj-red); display: flex; flex-direction: column; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .grid-container img { width: 100%; height: 140px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

<div class="header">
    <!-- Replace with your hosted link for "Untitled design (1).png" -->
    <div style="font-weight:bold; font-size:20px; color:var(--sj-red);">SHANTI JEWEL</div>
</div>

<div id="addPage" class="page active">
    <div class="card">
        <input type="text" id="i_id" placeholder="Order Number">
        <input type="file" id="fIn" multiple accept="image/*" onchange="processPhotos(event)">
        <div id="pv" style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:10px;"></div>
        <button class="btn btn-red" onclick="saveOrder()">SAVE ORDER</button>
    </div>
</div>

<div id="listPage" class="page"><div id="mainList"></div></div>

<!-- FORM FOR DOWNLOAD -->
<div id="formCanvas">
    <div style="text-align:center;">
        <h2 style="color:var(--sj-navy); margin:0;">SHANTI JEWEL</h2>
        <small>ORDER FORM</small>
    </div>
    <div id="c_imgs" class="grid-container"></div>
    <div id="c_details" style="margin-top:15px; font-size:18px;"></div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">PUNCH</div>
    <div class="tab" onclick="nav('list', this)">PRODUCTION</div>
</div>

<script>
    // Use your existing Firebase Config here
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let photos = [];

    function processPhotos(e) {
        const files = Array.from(e.target.files).slice(0, 4);
        photos = [];
        files.forEach(f => {
            const r = new FileReader();
            r.onload = ev => { photos.push(ev.target.result); };
            r.readAsDataURL(f);
        });
    }

    function saveOrder() {
        const id = document.getElementById('i_id').value;
        if(!id) return alert("Enter Order ID");
        db.ref('orders/' + id).set({ id, imgs: photos, ts: Date.now() }).then(() => location.reload());
    }

    function nav(p, el) {
        document.querySelectorAll('.page, .tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'list') loadOrders();
    }

    function loadOrders() {
        db.ref('orders').on('value', s => {
            const list = document.getElementById('mainList');
            list.innerHTML = "";
            Object.values(s.val() || {}).forEach(o => {
                list.innerHTML += `<div class="card">
                    <b>ID: ${o.id}</b><br>
                    <button class="btn btn-red" onclick="downloadForm('${o.id}')">DOWNLOAD FORM</button>
                </div>`;
            });
            window.activeData = s.val();
        });
    }

    function downloadForm(id) {
        const o = window.activeData[id];
        document.getElementById('c_imgs').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');
        
        setTimeout(() => {
            html2canvas(document.querySelector("#formCanvas"), { scale: 1.5, logging: false }).then(canvas => {
                const dataUrl = canvas.toDataURL("image/jpeg");
                const link = document.createElement('a');
                link.href = dataUrl;
                link.download = `SJ_${id}.jpg`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }).catch(err => alert("Download failed: " + err));
        }, 500);
    }
</script>
</body>
</html>
