<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel ERP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--brown); color: white; text-align: center; padding: 15px; border-bottom: 3px solid var(--gold); }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #ddd; }
        .flow-box { display: flex; gap: 4px; margin: 10px 0; }
        .s { background: #eee; padding: 5px; border-radius: 4px; font-size: 9px; font-weight: bold; flex: 1; text-align: center; color: #777; }
        .s.active { background: var(--gold); color: white; }
        #formCanvas { background: white; width: 450px; padding: 25px; position: fixed; left: -5000px; border: 10px solid var(--gold); }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-out { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 5px; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .tab { flex: 1; text-align: center; line-height: 70px; font-size: 12px; font-weight: bold; color: #999; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); }
        .danger-zone { margin-top: 30px; border-top: 2px dashed #ffcdd2; padding-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="header">SHANTI JEWEL ERP</div>

<div id="addPage" class="page active">
    <div class="card">
        <input type="file" id="fIn" multiple accept="image/*" style="display:none" onchange="procImgs(e)">
        <button class="btn btn-gold" onclick="document.getElementById('fIn').click()">📸 ADD PHOTOS</button>
        <div id="pv" style="display:flex; gap:5px; margin:10px 0;"></div>
        
        <input type="text" id="i_id" placeholder="Order No">
        <input type="text" id="i_pa" placeholder="Party Name">
        <input type="text" id="i_wt" placeholder="Weight (g)">
        <textarea id="i_sp" placeholder="Instructions"></textarea>
        <button class="btn btn-gold" style="background:#2e7d32" onclick="save()">SAVE ORDER</button>
    </div>

    <!-- CLEANUP BUTTON -->
    <div class="danger-zone">
        <p style="color:red; font-size:12px;">ADMIN: CLEAR ALL RUBBISH DATA</p>
        <button class="btn" style="background:#ffebee; color:red; border:1px solid red; padding:8px;" onclick="wipeData()">WIPE DATABASE</button>
    </div>
</div>

<div id="listPage" class="page"><div id="mainList"></div></div>

<div id="formCanvas">
    <h2 style="text-align:center; color:var(--brown); border-bottom:4px solid var(--gold); padding-bottom:10px;">SHANTI JEWEL</h2>
    <div id="c_imgs" style="text-align:center; margin:15px 0;"></div>
    <div style="font-size:22px; line-height:1.6;">
        <b>ORDER ID:</b> #<span id="c_id"></span><br>
        <b>PARTY:</b> <span id="c_pa"></span><br>
        <b>WEIGHT:</b> <span id="c_wt"></span>g<br>
        <div style="margin-top:10px; border:1px solid #ddd; padding:10px;">
            <b>NOTES:</b><br><span id="c_sp"></span>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">PUNCH</div>
    <div class="tab" onclick="nav('list', this)">PRODUCTION</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const depts = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];
    let photos = [];

    function procImgs(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        photos = []; document.getElementById('pv').innerHTML = "";
        files.forEach(f => {
            const r = new FileReader();
            r.onload = ev => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; canvas.height = (img.height/img.width)*600;
                    canvas.getContext('2d').drawImage(img,0,0,600,canvas.height);
                    const res = canvas.toDataURL("image/jpeg", 0.6);
                    photos.push(res);
                    document.getElementById('pv').innerHTML += `<img src="${res}" style="width:40px;height:40px;border-radius:4px;">`;
                };
            };
            r.readAsDataURL(f);
        });
    }

    function save() {
        const id = document.getElementById('i_id').value;
        if(!id || photos.length === 0) return alert("Order No & Photo Required");
        db.ref('orders/' + id).set({
            id: id, party: document.getElementById('i_pa').value || "-",
            weight: document.getElementById('i_wt').value || "0",
            specs: document.getElementById('i_sp').value || "None",
            imgs: photos, status: "CAD", ts: Date.now()
        }).then(() => { alert("Order Saved!"); location.reload(); });
    }

    function wipeData() {
        const pass = prompt("Enter Admin Password to delete all orders:");
        if(pass === "1234") {
            if(confirm("Are you sure? This will delete EVERY order forever.")) {
                db.ref('orders').remove().then(() => {
                    alert("Database Cleared!");
                    location.reload();
                });
            }
        } else { alert("Wrong Password!"); }
    }

    function nav(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p === 'list') load();
    }

    function load() {
        db.ref('orders').on('value', s => {
            const list = document.getElementById('mainList');
            list.innerHTML = "";
            const raw = s.val() || {};
            const data = Object.values(raw).sort((a,b) => b.ts - a.ts);
            data.forEach(o => {
                const cur = o.status || "CAD";
                let steps = depts.map(d => `<div class="s ${cur === d ? 'active' : ''}">${d}</div>`).join('');
                list.innerHTML += `
                <div class="card">
                    <div style="display:flex; gap:10px;">
                        <img src="${o.imgs ? o.imgs[0] : ''}" style="width:65px; height:65px; object-fit:cover; border-radius:6px;">
                        <div style="flex:1"><b>#${o.id || 'N/A'}</b> - ${o.party || '-'}<br><small>Dept: ${cur}</small></div>
                    </div>
                    <div class="flow-box">${steps}</div>
                    <button class="btn btn-out" onclick="move('${o.id}', '${cur}')">MOVE NEXT ▶</button>
                    <button class="btn btn-out" style="color:green; border-color:green;" onclick="down('${o.id}')">DOWNLOAD JPG</button>
                </div>`;
            });
            window.localData = data;
        });
    }

    function move(id, cur) {
        const idx = depts.indexOf(cur);
        if(idx < depts.length - 1) {
            db.ref('orders/' + id).update({ status: depts[idx + 1] });
        }
    }

    function down(id) {
        const o = window.localData.find(x => x.id === id);
        if(!o) return;
        document.getElementById('c_id').innerText = o.id;
        document.getElementById('c_pa').innerText = o.party;
        document.getElementById('c_wt').innerText = o.weight;
        document.getElementById('c_sp').innerText = o.specs;
        document.getElementById('c_imgs').innerHTML = o.imgs.map(i => `<img src="${i}" style="width:100%; margin-bottom:10px; border-radius:8px;">`).join('');
        setTimeout(() => {
            html2canvas(document.querySelector("#formCanvas"), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `SJ_${o.id}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
            });
        }, 600);
    }
</script>
</body>
</html>
