<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANTI JEWEL ORDER PORTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #4e342e; --red: #d32f2f; --bg: #f9f9f9; }
        body { font-family: 'Helvetica', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--brown); color: white; text-align: center; padding: 20px; border-bottom: 4px solid var(--gold); }
        .logo-main { font-size: 28px; font-weight: bold; margin: 0; }
        .logo-sub { font-size: 14px; letter-spacing: 5px; color: var(--gold); }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* THE A4 PORTRAIT RED FORM */
        #cadCanvas { 
            background: white; 
            width: 794px; /* Standard A4 Aspect Ratio Width */
            min-height: 1123px; /* Standard A4 Aspect Ratio Height */
            padding: 50px; 
            position: fixed; 
            left: -9999px; 
            border: 25px solid var(--red); 
            color: var(--red); 
            box-sizing: border-box;
        }
        .cad-header { text-align: center; border-bottom: 5px solid var(--red); padding-bottom: 20px; margin-bottom: 40px; }
        .cad-imgs { display: flex; flex-direction: column; gap: 20px; align-items: center; margin-bottom: 40px; }
        .cad-imgs img { width: 90%; border: 4px solid var(--red); border-radius: 15px; }
        .cad-info-row { display: flex; justify-content: space-between; font-size: 28px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #ffcccc; }
        .specs-area { margin-top: 30px; border: 3px solid var(--red); padding: 20px; border-radius: 10px; font-size: 26px; }

        /* Form Inputs */
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn { padding: 16px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-red { background: var(--red); color: white; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 2px solid #ddd; height: 75px; }
        .tab { flex: 1; text-align: center; padding: 18px; font-size: 13px; font-weight: bold; color: #999; }
        .tab.active { color: var(--brown); border-top: 5px solid var(--brown); }
        .wf-row { display: flex; align-items: center; gap: 15px; }
        .wf-img { width: 80px; height: 80px; object-fit: cover; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-main">SHANTI JEWEL</div>
    <div class="logo-sub">ORDER FORM</div>
</div>

<!-- PUNCH PAGE -->
<div id="addPage" class="page active">
    <div class="card">
        <h2 id="displayCadId" style="color:var(--red); text-align:center;">CAD ID: #...</h2>
        <div style="border:2px dashed var(--gold); padding:30px; text-align:center; border-radius:10px; cursor:pointer;" onclick="document.getElementById('fileIn').click()">
            <span id="upMsg">📸 TAP TO UPLOAD DESIGN</span>
            <div id="previews" style="display:flex; gap:10px; justify-content:center; margin-top:15px;"></div>
        </div>
        <input type="file" id="fileIn" multiple accept="image/*" style="display:none" onchange="handleImgs(event)">
        
        <input type="text" id="custNo" placeholder="Customer Order No (e.g. MNACOG-...)">
        <input type="text" id="pName" placeholder="Party Name (Internal)">
        
        <select id="cat">
            <option value="">Select Category</option>
            <option>RING</option><option>EARRING</option><option>BRACLET</option>
            <option>KADA</option><option>NECKLACE</option><option>PENDANT</option>
            <option>ORNAMENTS</option>
        </select>

        <div style="display:flex; gap:10px;">
            <input type="text" id="pur" placeholder="Purity">
            <input type="number" id="pcs" placeholder="Pcs">
        </div>
        
        <div style="display:flex; gap:10px;">
            <input type="text" id="wt" placeholder="Net Wt (g)">
            <input type="text" id="sz" placeholder="Size">
        </div>

        <select id="wrk">
            <option value="">Assign CAD Worker</option>
            <option>ALAUDIN</option>
            <option>CHETAN SHINDE</option>
            <option>DYE</option>
        </select>

        <textarea id="spc" rows="3" placeholder="Specs & Instructions..."></textarea>
        <button class="btn btn-gold" onclick="save()">PUNCH ORDER</button>
    </div>
</div>

<div id="statusPage" class="page"><div id="statusList"></div></div>
<div id="infoPage" class="page"><div id="infoList"></div></div>

<!-- THE A4 RED FORM -->
<div id="cadCanvas">
    <div class="cad-header">
        <h1 style="font-size:70px; margin:0;">SHANTI JEWEL</h1>
        <p style="letter-spacing:15px; font-size:24px; margin:10px 0; font-weight:bold;">ORDER FORM</p>
    </div>
    <div id="cadImgBox" class="cad-imgs"></div>
    <div class="cad-content">
        <div style="font-size:45px; border-bottom: 5px solid var(--red); margin-bottom:30px; display:inline-block;">
            CAD ID: #<span id="resId"></span>
        </div>
        <div class="cad-info-row"><span>CATEGORY:</span> <span id="resCat"></span></div>
        <div class="cad-info-row"><span>PURITY:</span> <span id="resPur"></span></div>
        <div class="cad-info-row"><span>NET WT:</span> <span id="resWt"></span>g</div>
        <div class="cad-info-row"><span>PCS:</span> <span id="resPcs"></span></div>
        <div class="cad-info-row"><span>SIZE:</span> <span id="resSz"></span></div>
        <div class="cad-info-row"><span>ASSIGNED TO:</span> <span id="resWrk"></span></div>
        
        <div class="specs-area">
            <b>DESIGN SPECS:</b><br>
            <span id="resSpc" style="font-weight:normal;"></span>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">PUNCH</div>
    <div class="tab" onclick="nav('status', this)">WORKFLOW</div>
    <div class="tab" onclick="nav('info', this)">ALL ORDERS</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentImgs = [];
    let nextCadId = 100;

    function fetchNextId() {
        db.ref('orders').limitToLast(1).once('value', (s) => {
            if (s.exists()) {
                const val = Object.values(s.val())[0];
                nextCadId = (parseInt(val.cadId) || 99) + 1;
            } else { nextCadId = 100; }
            document.getElementById('displayCadId').innerText = "CAD ID: #" + nextCadId;
        });
    }
    fetchNextId();

    function handleImgs(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        currentImgs = [];
        const pre = document.getElementById('previews');
        pre.innerHTML = "";
        files.forEach(f => {
            const r = new FileReader();
            r.onload = (rs) => {
                currentImgs.push(rs.target.result);
                pre.innerHTML += `<img src="${rs.target.result}" style="width:50px; height:50px; border-radius:5px; object-fit:cover; border:1px solid var(--gold);">`;
            };
            r.readAsDataURL(f);
        });
    }

    function save() {
        const cNo = document.getElementById('custNo').value;
        const cid = nextCadId.toString();
        if(!cNo || currentImgs.length === 0) return alert("Photo & Order No required!");
        
        db.ref('orders/' + cid).set({
            cadId: cid,
            custOrderNo: cNo,
            party: document.getElementById('pName').value,
            category: document.getElementById('cat').value,
            purity: document.getElementById('pur').value,
            pcs: document.getElementById('pcs').value,
            ntwt: document.getElementById('wt').value,
            size: document.getElementById('sz').value,
            worker: document.getElementById('wrk').value,
            specs: document.getElementById('spc').value,
            imgs: currentImgs,
            status: "CAD"
        }).then(() => { alert("Order Punched!"); location.reload(); });
    }

    function nav(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p !== 'add') loadData();
    }

    function loadData() {
        db.ref('orders').on('value', (s) => {
            const data = s.val();
            const sL = document.getElementById('statusList');
            const iL = document.getElementById('infoList');
            sL.innerHTML = ""; iL.innerHTML = "";
            if(!data) return;

            Object.values(data).reverse().forEach(o => {
                sL.innerHTML += `<div class="card wf-row">
                    <img src="${o.imgs[0]}" class="wf-img">
                    <div style="flex:1">
                        <b style="font-size:16px;">CAD #${o.cadId} | CUST: ${o.custOrderNo}</b><br>
                        <span style="color:#666; font-size:13px;">${o.category} | ${o.worker}</span>
                        <button class="btn btn-red" style="padding:6px; font-size:12px;" onclick="generatePDF('${o.cadId}')">DOWNLOAD A4 FORM</button>
                    </div>
                </div>`;

                iL.innerHTML += `<div class="card" onclick="alert('Full Specs: ${o.specs}')">
                    <div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding-bottom:5px;">
                        <b>CAD ID: ${o.cadId}</b> <b>${o.custOrderNo}</b>
                    </div>
                    <p style="margin:8px 0; font-size:14px;">${o.party} | ${o.category} | ${o.ntwt}g | ${o.worker}</p>
                    <small style="color:var(--gold); font-weight:bold;">CLICK FOR ALL INFORMATION</small>
                </div>`;
            });
        });
    }

    function generatePDF(id) {
        db.ref('orders/' + id).once('value', (s) => {
            const o = s.val();
            document.getElementById('resId').innerText = o.cadId;
            document.getElementById('resCat').innerText = o.category;
            document.getElementById('resPur').innerText = o.purity;
            document.getElementById('resWt').innerText = o.ntwt;
            document.getElementById('resPcs').innerText = o.pcs;
            document.getElementById('resSz').innerText = o.size;
            document.getElementById('resWrk').innerText = o.worker;
            document.getElementById('resSpc').innerText = o.specs;
            document.getElementById('cadImgBox').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');

            html2canvas(document.querySelector("#cadCanvas"), { scale: 2 }).then(cvs => {
                const l = document.createElement('a');
                l.download = `SJ_A4_Order_${o.cadId}.jpg`;
                l.href = cvs.toDataURL("image/jpeg", 0.95);
                l.click();
            });
        });
    }
</script>
</body>
</html>
