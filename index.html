<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel ERP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        .header { background: var(--brown); color: white; text-align: center; padding: 18px; font-weight: bold; border-bottom: 3px solid var(--gold); }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        /* Workflow Styling */
        .arrow-container { display: flex; gap: 5px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; }
        .step { background: #e0e0e0; padding: 6px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; color: #777; }
        .step.active { background: var(--gold); color: white; }

        /* Form Canvas - Optimized for WhatsApp/Mobile */
        #cadCanvas { background: white; width: 500px; padding: 30px; position: fixed; left: -5000px; border: 10px solid var(--gold); color: #333; }
        .cad-imgs { text-align: center; margin: 15px 0; }
        .cad-imgs img { width: 90%; height: auto; border-radius: 10px; border: 2px solid #eee; margin-bottom: 10px; }

        /* UI Buttons */
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-outline { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 8px; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 20px 5px; font-size: 12px; color: #999; font-weight: bold; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); }
    </style>
</head>
<body>

<div class="header">SHANTI JEWEL</div>

<!-- TAB 1: PUNCH -->
<div id="addPage" class="page active">
    <div class="card">
        <div id="uploadArea" style="border:2px dashed var(--gold); padding:20px; text-align:center; border-radius:10px;" onclick="document.getElementById('fileInput').click()">
            <span id="upMsg">📸 TAP TO ADD PHOTOS</span>
            <div id="previews" style="display:flex; gap:5px; justify-content:center; margin-top:10px;"></div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="compressImages(event)">
        
        <input type="text" id="orderId" placeholder="Order No (e.g. 101)">
        <input type="text" id="party" placeholder="Party Name">
        <input type="text" id="weight" placeholder="Weight (g)">
        <input type="text" id="size" placeholder="Size">
        <textarea id="specs" placeholder="Instructions"></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">PUNCH ORDER</button>
    </div>
</div>

<!-- TAB 2: WORKFLOW -->
<div id="statusPage" class="page"><div id="statusList"></div></div>

<!-- TAB 3: ALL ORDERS -->
<div id="infoPage" class="page"><div id="fullInfoList"></div></div>

<!-- ORDER FORM CANVAS (Optimized Size) -->
<div id="cadCanvas">
    <div style="text-align:center; border-bottom:4px solid var(--brown); padding-bottom:10px;">
        <h2 style="margin:0; font-size:40px;">SHANTI JEWEL</h2>
        <p style="letter-spacing:5px; margin:5px 0;">PRODUCTION FORM</p>
    </div>
    <div id="cadImgContainer" class="cad-imgs"></div>
    <div style="font-size:24px; line-height:1.8;">
        <b>Order ID:</b> #<span id="cId"></span><br>
        <b>Party:</b> <span id="cParty"></span><br>
        <b>Weight:</b> <span id="cWt"></span>g | <b>Size:</b> <span id="cSz"></span><br>
        <div style="margin-top:10px; border-top:1px solid #ddd; padding-top:10px;">
            <b>Instructions:</b><br>
            <div id="cSpecs" style="background:#f4f4f4; padding:15px; border-radius:8px;"></div>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">PUNCH</div>
    <div class="tab" onclick="nav('status', this)">WORKFLOW</div>
    <div class="tab" onclick="nav('info', this)">ALL</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const deptFlow = ["CAD", "CAM", "CASTING", "POLISHING", "HUID", "READY"];
    let currentPhotos = [];

    function compressImages(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        currentPhotos = [];
        document.getElementById('previews').innerHTML = "";
        files.forEach(file => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = ev => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 600; canvas.height = (img.height / img.width) * 600;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    const compressed = canvas.toDataURL("image/jpeg", 0.7);
                    currentPhotos.push(compressed);
                    document.getElementById('previews').innerHTML += `<img src="${compressed}" style="width:40px;height:40px;border-radius:4px;">`;
                };
            };
        });
    }

    function nav(p, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p !== 'add') loadData();
    }

    function saveOrder() {
        const id = document.getElementById('orderId').value;
        if(!id || currentPhotos.length === 0) return alert("Missing Order No or Photo");
        db.ref('orders/' + id).set({
            id: id,
            party: document.getElementById('party').value || "-",
            weight: document.getElementById('weight').value || "0",
            size: document.getElementById('size').value || "-",
            specs: document.getElementById('specs').value || "None",
            imgs: currentPhotos,
            status: "CAD",
            time: Date.now()
        }).then(() => location.reload());
    }

    function loadData() {
        db.ref('orders').on('value', snap => {
            const data = snap.val() || {};
            const sList = document.getElementById('statusList');
            const iList = document.getElementById('fullInfoList');
            sList.innerHTML = ""; iList.innerHTML = "";
            
            Object.values(data).sort((a,b) => b.time - a.time).forEach(o => {
                const img = (o.imgs && o.imgs[0]) ? o.imgs[0] : "";
                const id = o.id || "Error";
                const status = o.status || "CAD";

                // Workflow List
                let steps = deptFlow.map(s => `<div class="step ${status === s ? 'active' : ''}">${s}</div>`).join('');
                sList.innerHTML += `
                <div class="card">
                    <div style="display:flex; gap:10px;">
                        <img src="${img}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;">
                        <div><b>#${id}</b> - ${o.party}<br><small>Dept: ${status}</small></div>
                    </div>
                    <div class="arrow-container">${steps}</div>
                    <button class="btn btn-outline" onclick="moveNext('${id}', '${status}')">MOVE TO NEXT</button>
                    <button class="btn btn-outline" style="color:green; border-color:green;" onclick="downloadForm('${id}')">DOWNLOAD FORM</button>
                </div>`;

                // All Info
                iList.innerHTML += `<div class="card"><b>#${id}</b> | ${o.party}<br>${o.weight}g | ${o.size}</div>`;
            });
        });
    }

    function moveNext(id, current) {
        const idx = deptFlow.indexOf(current);
        if(idx < deptFlow.length - 1) {
            db.ref('orders/' + id).update({ status: deptFlow[idx + 1] });
        } else { alert("Order is Finished!"); }
    }

    function downloadForm(id) {
        db.ref('orders/' + id).once('value', snap => {
            const o = snap.val();
            document.getElementById('cId').innerText = o.id;
            document.getElementById('cParty').innerText = o.party;
            document.getElementById('cWt').innerText = o.weight;
            document.getElementById('cSz').innerText = o.size;
            document.getElementById('cSpecs').innerText = o.specs;
            document.getElementById('cadImgContainer').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');
            
            setTimeout(() => {
                html2canvas(document.querySelector("#cadCanvas")).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `SJ_${o.id}.jpg`;
                    link.href = canvas.toDataURL("image/jpeg", 0.8);
                    link.click();
                });
            }, 500);
        });
    }
</script>
</body>
</html>
