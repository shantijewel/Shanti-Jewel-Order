<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANTI JEWEL ORDER PORTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #4e342e; --red: #d32f2f; --bg: #f4f4f4; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--brown); color: white; text-align: center; padding: 15px; border-bottom: 4px solid var(--gold); }
        .logo-main { font-size: 24px; font-weight: bold; margin: 0; }
        .logo-sub { font-size: 12px; letter-spacing: 4px; color: var(--gold); }

        .page { display: none; padding: 12px; }
        .page.active { display: block; }
        .card { background: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ddd; }
        
        /* A4 PORTRAIT RED FORM */
        #cadCanvas { background: white; width: 794px; min-height: 1123px; padding: 40px; position: fixed; left: -9999px; border: 20px solid var(--red); color: var(--red); box-sizing: border-box; }
        .cad-header { text-align: center; border-bottom: 4px solid var(--red); padding-bottom: 15px; margin-bottom: 30px; }
        .cad-imgs { display: flex; flex-direction: column; gap: 15px; align-items: center; margin-bottom: 30px; }
        .cad-imgs img { width: 85%; border: 3px solid var(--red); border-radius: 10px; }
        .cad-row { display: flex; justify-content: space-between; font-size: 24px; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #ffcccc; }

        input, select, textarea { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        .search-bar { background: #fff; position: sticky; top: 0; z-index: 10; padding: 5px 0; margin-bottom: 10px; }
        .btn { padding: 14px; border: none; border-radius: 6px; font-weight: bold; width: 100%; cursor: pointer; font-size: 14px; margin-top: 8px; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-red { background: var(--red); color: white; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 2px solid #ddd; height: 65px; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 11px; font-weight: bold; color: #888; text-decoration: none; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); }
        .thumb { width: 70px; height: 70px; object-fit: cover; border-radius: 5px; border: 1px solid #eee; margin-right: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-main">SHANTI JEWEL</div>
    <div class="logo-sub">ORDER FORM</div>
</div>

<!-- 1. PUNCH PAGE -->
<div id="addPage" class="page active">
    <div class="card">
        <h3 id="cadIdTitle" style="color:var(--red); text-align:center; margin:0 0 10px 0;">CAD ID: #...</h3>
        <div style="border:2px dashed var(--gold); padding:20px; text-align:center; border-radius:8px; cursor:pointer;" onclick="document.getElementById('fileIn').click()">
            <span id="upMsg" style="font-weight:bold;">📸 UPLOAD PHOTO</span>
            <div id="previews" style="display:flex; gap:8px; justify-content:center; margin-top:10px;"></div>
        </div>
        <input type="file" id="fileIn" multiple accept="image/*" style="display:none" onchange="handleFiles(event)">
        
        <input type="text" id="custIn" placeholder="Customer Order No.">
        <input type="text" id="partyIn" placeholder="Party Name">
        
        <select id="catIn">
            <option value="">Select Item Category</option>
            <option>RING</option><option>EARRING</option><option>BRACLET</option>
            <option>KADA</option><option>NECKLACE</option><option>PENDANT</option>
            <option>ORNAMENTS</option>
        </select>

        <div style="display:flex; gap:8px;">
            <input type="text" id="purIn" placeholder="Purity">
            <input type="number" id="pcsIn" placeholder="Pcs">
        </div>
        
        <div style="display:flex; gap:8px;">
            <input type="text" id="wtIn" placeholder="Net Wt (g)">
            <input type="text" id="szIn" placeholder="Size">
        </div>

        <select id="wrkIn">
            <option value="">Select CAD Worker</option>
            <option>ALAUDIN</option><option>CHETAN SHINDE</option><option>DYE</option>
        </select>

        <textarea id="spcIn" rows="2" placeholder="Design Specs..."></textarea>
        <button class="btn btn-gold" onclick="punch()">PUNCH ORDER</button>
    </div>
</div>

<!-- 2. WORKFLOW PAGE -->
<div id="statusPage" class="page">
    <div id="workflowList"></div>
</div>

<!-- 3. ALL ORDERS PAGE (With Search) -->
<div id="infoPage" class="page">
    <div class="search-bar">
        <input type="text" id="orderSearch" placeholder="🔍 Search Customer Order No..." onkeyup="filterOrders()">
    </div>
    <div id="allOrdersList"></div>
</div>

<!-- HIDDEN A4 CANVAS -->
<div id="cadCanvas">
    <div class="cad-header">
        <h1 style="font-size:65px; margin:0;">SHANTI JEWEL</h1>
        <p style="letter-spacing:12px; font-size:22px; margin:8px 0; font-weight:bold;">ORDER FORM</p>
    </div>
    <div id="canvasImgBox" class="cad-imgs"></div>
    <div>
        <div style="font-size:40px; border-bottom: 4px solid var(--red); margin-bottom:20px; display:inline-block;">
            CAD ID: #<span id="outId"></span>
        </div>
        <div class="cad-row"><span>CATEGORY:</span> <span id="outCat"></span></div>
        <div class="cad-row"><span>PURITY:</span> <span id="outPur"></span></div>
        <div class="cad-row"><span>NET WT:</span> <span id="outWt"></span>g</div>
        <div class="cad-row"><span>PCS:</span> <span id="outPcs"></span></div>
        <div class="cad-row"><span>SIZE:</span> <span id="outSz"></span></div>
        <div class="cad-row"><span>CAD WORKER:</span> <span id="outWrk"></span></div>
        <div style="margin-top:25px; border:2px solid var(--red); padding:15px; font-size:24px;">
            <b>SPECS:</b> <span id="outSpc"></span>
        </div>
    </div>
</div>

<div class="tab-bar">
    <a href="#" class="tab active" onclick="nav('add', this)">PUNCH</a>
    <a href="#" class="tab" onclick="nav('status', this)">WORKFLOW</a>
    <a href="#" class="tab" onclick="nav('info', this)">ALL ORDERS</a>
</div>

<script>
    // Firebase Setup[cite: 1]
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentImgs = [];
    let nextId = 100;
    let allOrdersData = [];

    function syncId() {
        db.ref('orders').limitToLast(1).once('value', (snap) => {
            if (snap.exists()) {
                const last = Object.values(snap.val())[0];
                nextId = (parseInt(last.cadId) || 99) + 1;
            }
            document.getElementById('cadIdTitle').innerText = "CAD ID: #" + nextId;
        });
    }
    syncId();

    function handleFiles(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        currentImgs = [];
        const pre = document.getElementById('previews');
        pre.innerHTML = "";
        files.forEach(f => {
            const reader = new FileReader();
            reader.onload = (r) => {
                currentImgs.push(r.target.result);
                pre.innerHTML += `<img src="${r.target.result}" style="width:45px; height:45px; border-radius:4px; object-fit:cover;">`;
            };
            reader.readAsDataURL(f);
        });
    }

    function punch() {
        const custNo = document.getElementById('custIn').value;
        if(!custNo || currentImgs.length === 0) return alert("Missing Order No or Photos");
        const cid = nextId.toString();
        db.ref('orders/' + cid).set({
            cadId: cid,
            custOrderNo: custNo,
            party: document.getElementById('partyIn').value,
            category: document.getElementById('catIn').value,
            purity: document.getElementById('purIn').value,
            pcs: document.getElementById('pcsIn').value,
            ntwt: document.getElementById('wtIn').value,
            size: document.getElementById('szIn').value,
            worker: document.getElementById('wrkIn').value,
            specs: document.getElementById('spcIn').value,
            imgs: currentImgs,
            status: "CAD"
        }).then(() => { alert("Punched!"); location.reload(); });
    }

    function nav(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p !== 'add') fetchData();
    }

    function fetchData() {
        db.ref('orders').on('value', (s) => {
            const data = s.val();
            if(!data) return;
            allOrdersData = Object.values(data).reverse();
            renderLists(allOrdersData);
        });
    }

    function renderLists(items) {
        const wfL = document.getElementById('workflowList');
        const aiL = document.getElementById('allOrdersList');
        wfL.innerHTML = ""; aiL.innerHTML = "";

        items.forEach(o => {
            // WORKFLOW LIST[cite: 1]
            wfL.innerHTML += `<div class="card" style="display:flex; align-items:center;">
                <img src="${o.imgs ? o.imgs[0] : ''}" class="thumb">
                <div style="flex:1">
                    <b>CAD #${o.cadId} | CUST #${o.custOrderNo || 'N/A'}</b><br>
                    <small>${o.category || ''} | ${o.worker || ''}</small>
                    <button class="btn btn-red" style="padding:6px; font-size:11px;" onclick="exportA4('${o.cadId}')">EXPORT RED FORM</button>
                </div>
            </div>`;

            // ALL ORDERS LIST[cite: 1]
            aiL.innerHTML += `<div class="card" onclick="alert('Instructions: ${o.specs}')">
                <div style="display:flex; align-items:center;">
                    <img src="${o.imgs ? o.imgs[0] : ''}" class="thumb">
                    <div style="flex:1">
                        <div style="display:flex; justify-content:space-between;">
                             <b>CUST: ${o.custOrderNo}</b>
                             <b style="color:var(--red);">CAD: #${o.cadId}</b>
                        </div>
                        <p style="margin:5px 0; font-size:13px; color:#555;">${o.party} | ${o.category} | ${o.ntwt}g</p>
                        <small style="color:var(--gold);">VIEW FULL SPECS</small>
                    </div>
                </div>
            </div>`;
        });
    }

    function filterOrders() {
        const val = document.getElementById('orderSearch').value.toLowerCase();
        const filtered = allOrdersData.filter(o => 
            (o.custOrderNo && o.custOrderNo.toLowerCase().includes(val)) || 
            (o.cadId && o.cadId.includes(val))
        );
        renderLists(filtered);
    }

    function exportA4(id) {
        db.ref('orders/' + id).once('value', (s) => {
            const o = s.val();
            document.getElementById('outId').innerText = o.cadId;
            document.getElementById('outCat').innerText = o.category;
            document.getElementById('outPur').innerText = o.purity;
            document.getElementById('outWt').innerText = o.ntwt;
            document.getElementById('outPcs').innerText = o.pcs;
            document.getElementById('outSz').innerText = o.size;
            document.getElementById('outWrk').innerText = o.worker;
            document.getElementById('outSpc').innerText = o.specs;
            document.getElementById('canvasImgBox').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');

            html2canvas(document.querySelector("#cadCanvas"), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `SJ_Order_${o.cadId}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 0.9);
                link.click();
            });
        });
    }
</script>
</body>
</html>
