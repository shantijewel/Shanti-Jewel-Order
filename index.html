<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel ERP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --red: #b22222; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        .header { background: var(--brown); color: white; text-align: center; padding: 18px; font-weight: bold; letter-spacing: 1px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* THE RED CAD FORM FOR FREELANCERS - NO PARTY NAME */
        #cadCanvas { background: white; width: 500px; padding: 30px; position: fixed; left: -5000px; border: 15px solid var(--red); color: var(--red); }
        .cad-header { text-align: center; border-bottom: 4px solid var(--red); padding-bottom: 10px; margin-bottom: 20px; }
        .cad-imgs { display: flex; gap: 10px; justify-content: center; margin: 25px 0; }
        .cad-imgs img { height: 180px; width: 180px; object-fit: cover; border: 2px solid var(--red); border-radius: 5px; }
        .cad-data { font-size: 22px; font-weight: bold; line-height: 1.6; }

        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-red { background: var(--red); color: white; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .tab { flex: 1; text-align: center; padding: 25px 10px; font-size: 12px; font-weight: bold; color: #999; cursor: pointer; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); }
        
        .workflow-row { display: flex; gap: 5px; margin: 10px 0; overflow-x: auto; padding-bottom: 5px; }
        .workflow-step { font-size: 9px; padding: 4px 8px; border-radius: 3px; white-space: nowrap; }
    </style>
</head>
<body>

<div class="header">SHANTI JEWEL ERP</div>

<!-- NEW ORDER PAGE -->
<div id="addPage" class="page active">
    <div class="card">
        <h3 id="nextIdLabel" style="color:var(--red); margin:0;">NEXT ORDER ID: ...</h3>
        <div id="uploadBox" style="border:2px dashed #ccc; padding:20px; text-align:center; margin-top:10px;" onclick="document.getElementById('fileIn').click()">
            <span id="upMsg">UPLOAD DESIGN PHOTOS (MAX 3)</span>
            <div id="previews" style="display:flex; gap:5px; justify-content:center; margin-top:10px;"></div>
        </div>
        <input type="file" id="fileIn" multiple accept="image/*" style="display:none" onchange="previewImages(event)">
        
        <input type="text" id="party" placeholder="CUSTOMER NAME">
        <div style="display:flex; gap:10px;">
            <input type="text" id="weight" placeholder="WEIGHT IN GRAMS">
            <input type="text" id="size" placeholder="SIZE">
        </div>
        <input type="date" id="delDate">
        <textarea id="specs" placeholder="DETAILED INSTRUCTIONS FOR CAD WORKER"></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">PUNCH ORDER</button>
    </div>
</div>

<!-- WORKFLOW PAGE -->
<div id="statusPage" class="page">
    <div id="statusList"></div>
</div>

<!-- ALL ORDERS PAGE (RENAMED ARCHIVE) -->
<div id="infoPage" class="page">
    <div id="infoList"></div>
</div>

<!-- THE HIDDEN CAD FORM DESIGN (NO PARTY NAME HERE) -->
<div id="cadCanvas">
    <div class="cad-header">
        <h1 style="font-size:45px; margin:0;">SHANTI JEWEL</h1>
        <p style="letter-spacing:10px; font-size:18px; margin:5px 0;">ORDER FORM</p>
    </div>
    <div id="cadImgBox" class="cad-imgs"></div>
    <div class="cad-data">
        <span style="font-size:30px;">JOB ID: #<span id="cId"></span></span><br>
        WEIGHT: <span id="cWt"></span>G | SIZE: <span id="cSz"></span><br>
        DELIVERY DATE: <span id="cDate"></span><br>
        <div style="margin-top:15px; border-top:2px solid var(--red); padding-top:10px;">
            INSTRUCTIONS:<br>
            <span id="cSpecs" style="font-weight:normal;"></span>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">NEW</div>
    <div class="tab" onclick="nav('status', this)">WORKFLOW</div>
    <div class="tab" onclick="nav('info', this)">ALL ORDERS</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentImgs = [];
    let nextOrderNum = 100;
    const flow = ["CAD", "CAM", "CASTING", "POLISHING", "HUID", "READY"];

    function getNextId() {
        db.ref('orders').limitToLast(1).once('value', (snap) => {
            if (snap.exists()) {
                const lastOrder = Object.values(snap.val())[0];
                nextOrderNum = parseInt(lastOrder.id) + 1;
            }
            document.getElementById('nextIdLabel').innerText = "NEXT ORDER ID: #" + nextOrderNum;
        });
    }
    getNextId();

    function previewImages(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        currentImgs = [];
        const container = document.getElementById('previews');
        container.innerHTML = "";
        files.forEach(f => {
            const reader = new FileReader();
            reader.onload = (rs) => {
                currentImgs.push(rs.target.result);
                container.innerHTML += `<img src="${rs.target.result}" style="width:50px; height:50px; border-radius:5px; object-fit:cover;">`;
            };
            reader.readAsDataURL(f);
        });
        document.getElementById('upMsg').innerText = files.length + " IMAGES LOADED";
    }

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        el.classList.add('active');
        if(page === 'status' || page === 'info') render();
    }

    function saveOrder() {
        const party = document.getElementById('party').value;
        if(!party || currentImgs.length === 0) return alert("ENTER DETAILS AND PHOTOS");
        
        const newId = nextOrderNum.toString();
        db.ref('orders/' + newId).set({
            id: newId, party, weight: document.getElementById('weight').value,
            size: document.getElementById('size').value, date: document.getElementById('delDate').value,
            specs: document.getElementById('specs').value, imgs: currentImgs, status: "CAD", ts: Date.now()
        }).then(() => { alert("ORDER SAVED"); location.reload(); });
    }

    function render() {
        db.ref('orders').on('value', (snap) => {
            const data = snap.val();
            const sList = document.getElementById('statusList');
            const iList = document.getElementById('infoList');
            sList.innerHTML = ""; iList.innerHTML = "";
            if(!data) return;

            Object.values(data).reverse().forEach(o => {
                let steps = flow.map(s => `<div class="workflow-step" style="background:${o.status===s?'#D4AF37':'#eee'}; color:${o.status===s?'white':'#999'};">${s}</div>`).join(' > ');
                
                sList.innerHTML += `<div class="card">
                    <b>ID: #${o.id} | ${o.party}</b>
                    <div class="workflow-row">${steps}</div>
                    <button class="btn btn-red" onclick="downloadCAD('${o.id}')">DOWNLOAD CAD FORM</button>
                    <button class="btn btn-gold" onclick="updateStatus('${o.id}', '${o.status}')">MOVE NEXT STAGE</button>
                </div>`;

                iList.innerHTML += `<div class="card">
                    <h3>ID: #${o.id} | ${o.party}</h3>
                    <p>WEIGHT: ${o.weight}G | SIZE: ${o.size} | DUE: ${o.date}</p>
                    <div style="display:flex; gap:5px; overflow-x:auto;">
                        ${o.imgs.map(img => `<img src="${img}" style="height:80px; border-radius:5px;">`).join('')}
                    </div>
                </div>`;
            });
        });
    }

    function updateStatus(id, current) {
        const nextIdx = flow.indexOf(current) + 1;
        if(nextIdx >= flow.length) return alert("ORDER READY");
        if(confirm("MOVE TO " + flow[nextIdx] + "?")) {
            db.ref('orders/' + id).update({status: flow[nextIdx]});
        }
    }

    function downloadCAD(id) {
        db.ref('orders/' + id).once('value', (snap) => {
            const o = snap.val();
            document.getElementById('cId').innerText = o.id;
            document.getElementById('cWt').innerText = o.weight;
            document.getElementById('cSz').innerText = o.size;
            document.getElementById('cDate').innerText = o.date;
            document.getElementById('cSpecs').innerText = o.specs;
            document.getElementById('cadImgBox').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');

            html2canvas(document.querySelector("#cadCanvas"), { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `CAD_JOB_${o.id}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 1.0);
                link.click();
            });
        });
    }
</script>
</body>
</html>
