<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel ERP</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; color: #333; }
        
        .header { background: var(--brown); color: white; text-align: center; padding: 18px; font-weight: bold; font-size: 20px; letter-spacing: 1px; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        /* Cards */
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .info-label { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; }
        
        /* Workflow Arrows */
        .arrow-container { display: flex; gap: 5px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; }
        .step { background: #e0e0e0; padding: 5px 10px; border-radius: 4px; font-size: 10px; font-weight: bold; color: #777; white-space: nowrap; }
        .step.active { background: var(--gold); color: white; }

        /* Form for CAD Image */
        #cadCanvas { background: white; width: 450px; padding: 30px; position: fixed; left: -3000px; border: 10px solid var(--gold); }
        .cad-imgs { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .cad-imgs img { height: 150px; width: 150px; object-fit: cover; border-radius: 10px; }

        /* UI Elements */
        input, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-outline { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 5px; }

        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 11px; color: #999; font-weight: bold; }
        .tab.active { color: var(--brown); border-top: 3px solid var(--brown); }
    </style>
</head>
<body>

<div class="header">SHANTI JEWEL</div>

<!-- TAB 1: NEW ENTRY -->
<div id="addPage" class="page active">
    <div class="card">
        <div id="uploadArea" style="border:2px dashed #ccc; padding:30px; text-align:center; border-radius:10px;" onclick="document.getElementById('fileInput').click()">
            <span id="upMsg">📸 Tap to add up to 3 Design Photos</span>
            <div id="previews" style="display:flex; gap:5px; justify-content:center; margin-top:10px;"></div>
        </div>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none" onchange="previewImages(event)">
        
        <input type="text" id="orderId" placeholder="Order Number (Required)">
        <input type="text" id="party" placeholder="Party Name">
        <div style="display:flex; gap:10px;">
            <input type="text" id="weight" placeholder="Gross Wt (g)">
            <input type="text" id="size" placeholder="Size">
        </div>
        <input type="date" id="delDate">
        <textarea id="specs" rows="3" placeholder="Additional Specifications..."></textarea>
        <button class="btn btn-gold" onclick="saveToFirebase()">PUNCH ORDER</button>
    </div>
</div>

<!-- TAB 2: WORKFLOW (STATUS TRACKING) -->
<div id="statusPage" class="page">
    <div id="statusList"></div>
</div>

<!-- TAB 3: ORDER INFO (FULL DATA) -->
<div id="infoPage" class="page">
    <div id="fullInfoList"></div>
</div>

<!-- HIDDEN CANVAS FOR CAD IMAGE GENERATION -->
<div id="cadCanvas">
    <div style="text-align:center; border-bottom:3px solid var(--brown); padding-bottom:10px;">
        <h1 style="color:var(--brown); margin:0; font-size:35px;">SHANTI JEWEL</h1>
        <p style="letter-spacing:8px; margin:5px 0;">ORDER FORM</p>
    </div>
    <div id="cadImgContainer" class="cad-imgs"></div>
    <div style="font-size:24px; line-height:1.8;">
        <b>Order ID:</b> #<span id="cId"></span><br>
        <b>Customer:</b> <span id="cParty"></span><br>
        <b>Weight:</b> <span id="cWt"></span>g | <b>Size:</b> <span id="cSz"></span><br>
        <b>Delivery:</b> <span id="cDate"></span><br>
        <b>Notes:</b> <p id="cSpecs" style="background:#f9f9f9; padding:15px; border-radius:8px;"></p>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">NEW</div>
    <div class="tab" onclick="nav('status', this)">WORKFLOW</div>
    <div class="tab" onclick="nav('info', this)">ALL ORDERS</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentImages = [];
    const deptFlow = ["CAD", "CAM", "CASTING", "POLISHING", "HUID", "READY"];

    function previewImages(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        currentImages = [];
        const container = document.getElementById('previews');
        container.innerHTML = "";
        files.forEach(f => {
            const reader = new FileReader();
            reader.onload = (rs) => {
                currentImages.push(rs.target.result);
                container.innerHTML += `<img src="${rs.target.result}" style="width:50px; height:50px; border-radius:5px; object-fit:cover;">`;
            };
            reader.readAsDataURL(f);
        });
        document.getElementById('upMsg').innerText = files.length + " Images Selected";
    }

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        el.classList.add('active');
        if(page === 'status' || page === 'info') loadOrders();
    }

    function saveToFirebase() {
        const id = document.getElementById('orderId').value;
        if(!id) return alert("Enter Order Number!");
        db.ref('orders/' + id).set({
            id, party: document.getElementById('party').value,
            weight: document.getElementById('weight').value,
            size: document.getElementById('size').value,
            date: document.getElementById('delDate').value,
            specs: document.getElementById('specs').value,
            imgs: currentImages,
            status: "CAD",
            time: Date.now()
        }).then(() => { alert("Order Punched!"); location.reload(); });
    }

    function loadOrders() {
        db.ref('orders').on('value', (snap) => {
            const data = snap.val();
            const sList = document.getElementById('statusList');
            const iList = document.getElementById('fullInfoList');
            sList.innerHTML = ""; iList.innerHTML = "";
            if(!data) return;

            Object.values(data).reverse().forEach(o => {
                // Workflow Card
                let steps = deptFlow.map(s => `<div class="step ${o.status === s ? 'active' : ''}">${s}</div>`).join('');
                sList.innerHTML += `
                <div class="card">
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <img src="${o.imgs[0]}" style="width:70px; height:70px; border-radius:8px; object-fit:cover;">
                        <div>
                            <b>#${o.id} - ${o.party}</b><br>
                            <small>Next: ${deptFlow[deptFlow.indexOf(o.status)+1] || 'Completed'}</small>
                        </div>
                    </div>
                    <div class="arrow-container">${steps}</div>
                    <button class="btn btn-outline" style="font-size:12px;" onclick="moveNext('${o.id}', '${o.status}')">CONFIRM MOVE TO NEXT DEPT</button>
                    <button class="btn btn-outline" style="border-color:#25D366; color:#25D366;" onclick="makeCADImage('${o.id}')">SEND CAD FORM</button>
                </div>`;

                // Full Info Card
                iList.innerHTML += `
                <div class="card">
                    <div class="info-label">Order Details</div>
                    <h3>#${o.id} | ${o.party}</h3>
                    <p><b>Wt:</b> ${o.weight}g | <b>Size:</b> ${o.size}<br><b>Delivery:</b> ${o.date}</p>
                    <div class="info-label">Specifications</div>
                    <p style="background:#f4f4f4; padding:8px; border-radius:5px;">${o.specs || 'No notes'}</p>
                    <div style="display:flex; gap:5px; overflow-x:auto;">
                        ${o.imgs.map(m => `<img src="${m}" style="height:100px; border-radius:5px;">`).join('')}
                    </div>
                </div>`;
            });
        });
    }

    function moveNext(id, current) {
        const nextIdx = deptFlow.indexOf(current) + 1;
        if(nextIdx >= deptFlow.length) return alert("Order is already Ready!");
        if(confirm(`Move Order #${id} from ${current} to ${deptFlow[nextIdx]}?`)) {
            db.ref('orders/' + id).update({status: deptFlow[nextIdx]});
        }
    }

    function makeCADImage(id) {
        db.ref('orders/' + id).once('value', (snap) => {
            const o = snap.val();
            document.getElementById('cId').innerText = o.id;
            document.getElementById('cParty').innerText = o.party;
            document.getElementById('cWt').innerText = o.weight;
            document.getElementById('cSz').innerText = o.size;
            document.getElementById('cDate').innerText = o.date;
            document.getElementById('cSpecs').innerText = o.specs;
            document.getElementById('cadImgContainer').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');

            html2canvas(document.querySelector("#cadCanvas")).then(canvas => {
                const link = document.createElement('a');
                link.download = `Shanti_Order_${o.id}.jpg`;
                link.href = canvas.toDataURL("image/jpeg");
                link.click();
                alert("CAD Form Ready! Please check your downloads/gallery and share it.");
            });
        });
    }
</script>
</body>
</html>
