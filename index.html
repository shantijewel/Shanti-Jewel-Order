<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel ERP</title>
    <!-- Firebase & Image Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        /* Security Overlay */
        #authOverlay { position: fixed; inset: 0; background: var(--brown); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        .pin-input { width: 150px; text-align: center; font-size: 24px; letter-spacing: 10px; border: none; border-bottom: 2px solid white; background: none; color: white; margin: 20px; outline: none; }

        .header { background: var(--brown); color: white; text-align: center; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        /* Order Cards & Arrows */
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .arrow-line { display: flex; gap: 4px; margin-top: 10px; overflow-x: auto; }
        .arrow-step { background: #eee; padding: 4px 8px; border-radius: 4px; color: #999; font-size: 9px; }
        .arrow-step.active { background: var(--gold); color: white; }

        /* The Shareable Form Styling */
        #formCanvas { background: white; width: 400px; padding: 25px; border: 4px solid var(--gold); position: fixed; left: -2000px; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .tab { flex: 1; text-align: center; padding: 10px; font-size: 11px; color: #888; }
        .tab.active { color: var(--gold); }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<!-- PASSCODE LOCK -->
<div id="authOverlay">
    <h2>SHANTI JEWEL</h2>
    <p>Enter Access PIN</p>
    <input type="password" id="pin" class="pin-input" maxlength="4" oninput="checkPin(this.value)">
</div>

<div class="header">
    <span>SHANTI JEWEL</span>
    <span onclick="showTab('admin')" style="font-size: 12px;">🛡️</span>
</div>

<!-- NEW ORDER -->
<div id="addPage" class="page active">
    <div class="card">
        <div id="uploadBox" style="border:2px dashed var(--gold); padding:20px; text-align:center;" onclick="document.getElementById('multiFile').click()">
            <b id="upLabel">📸 UPLOAD IMAGES</b>
            <div id="previewGrid" style="display:flex; gap:5px; margin-top:10px; overflow-x:auto;"></div>
        </div>
        <input type="file" id="multiFile" accept="image/*" multiple style="display:none" onchange="handleFiles(event)">
        <input type="text" id="orderId" placeholder="Order Number">
        <input type="text" id="party" placeholder="Party Name">
        <input type="text" id="weight" placeholder="Weight (g)">
        <input type="text" id="size" placeholder="Size">
        <input type="date" id="deliveryDate">
        <textarea id="specs" placeholder="Specifications..."></textarea>
        <button class="btn" style="background:var(--gold); color:white;" onclick="saveOrder()">PUNCH ORDER</button>
    </div>
</div>

<!-- PENDING ORDERS -->
<div id="pendingPage" class="page">
    <div id="pendingList"></div>
</div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="page">
    <h3>Connected Devices</h3>
    <div id="deviceList" class="card"></div>
    <button class="btn" style="background:#e74c3c; color:white;" onclick="location.reload()">LOGOUT</button>
</div>

<!-- HIDDEN FORM FOR IMAGE CONVERSION -->
<div id="formCanvas">
    <div style="text-align:center; border-bottom:2px solid var(--brown);">
        <h1 style="color:var(--brown); margin:0;">SHANTI JEWEL</h1>
        <p style="letter-spacing:5px;">ORDER FORM</p>
    </div>
    <div id="cImgs" style="display:flex; justify-content:center; gap:10px; margin:20px 0;"></div>
    <div style="font-size:20px;">
        <b>Order:</b> #<span id="cId"></span><br>
        <b>Party:</b> <span id="cParty"></span><br>
        <b>Weight:</b> <span id="cWt"></span>g | <b>Size:</b> <span id="cSz"></span><br>
        <b>Date:</b> <span id="cDate"></span><br>
        <b>Specs:</b> <p id="cSpecs"></p>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="showTab('add', this)">NEW</div>
    <div class="tab" onclick="showTab('pending', this)">PENDING</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // SECURITY CONFIG
    const MASTER_PIN = "1008"; // SET YOUR PIN HERE
    const deviceId = "Dev-" + Math.floor(Math.random() * 9999);

    function checkPin(val) {
        if(val === MASTER_PIN) {
            document.getElementById('authOverlay').style.display = 'none';
            db.ref('devices/' + deviceId).set({ lastActive: Date.now(), id: deviceId });
        }
    }

    let uploadedImgs = [];
    const stages = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];

    function handleFiles(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        uploadedImgs = [];
        document.getElementById('previewGrid').innerHTML = "";
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (f) => {
                uploadedImgs.push(f.target.result);
                document.getElementById('previewGrid').innerHTML += `<img src="${f.target.result}" style="height:60px; border-radius:5px;">`;
            };
            reader.readAsDataURL(file);
        });
    }

    function showTab(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }
        if(page === 'pending') renderPending();
        if(page === 'admin') renderAdmin();
    }

    function saveOrder() {
        const id = document.getElementById('orderId').value;
        if(!id) return alert("Enter Order ID");
        db.ref('orders/' + id).set({
            id, party: document.getElementById('party').value,
            weight: document.getElementById('weight').value,
            size: document.getElementById('size').value,
            date: document.getElementById('deliveryDate').value,
            specs: document.getElementById('specs').value,
            images: uploadedImgs,
            status: "CAD"
        }).then(() => { alert("Saved!"); location.reload(); });
    }

    function renderPending() {
        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('pendingList');
            list.innerHTML = "";
            const data = snap.val(); if(!data) return;
            Object.values(data).forEach(o => {
                let arrows = stages.map(s => `<div class="arrow-step ${o.status === s ? 'active' : ''}">${s}</div>`).join('');
                list.innerHTML += `
                    <div class="card">
                        <div onclick="generateShareable('${o.id}')">
                            <b>#${o.id} | ${o.party}</b><br>
                            <small>Due: ${o.date} | Wt: ${o.weight}g</small>
                            <div class="arrow-line">${arrows}</div>
                        </div>
                        <button class="btn" style="background:#eee; font-size:10px;" onclick="advanceStage('${o.id}', '${o.status}')">MOVE NEXT</button>
                    </div>`;
            });
        });
    }

    function advanceStage(id, current) {
        const nextIdx = stages.indexOf(current) + 1;
        if(nextIdx < stages.length) db.ref('orders/' + id).update({status: stages[nextIdx]});
    }

    function renderAdmin() {
        db.ref('devices').on('value', (snap) => {
            const list = document.getElementById('deviceList');
            list.innerHTML = "";
            const data = snap.val(); if(!data) return;
            Object.values(data).forEach(d => {
                list.innerHTML += `<div>📱 ${d.id} <br><small>Active: ${new Date(d.lastActive).toLocaleTimeString()}</small></div><hr>`;
            });
        });
    }

    // THE MAGIC: Convert to Image
    function generateShareable(id) {
        db.ref('orders/' + id).once('value', (snap) => {
            const o = snap.val();
            document.getElementById('cId').innerText = o.id;
            document.getElementById('cParty').innerText = o.party;
            document.getElementById('cWt').innerText = o.weight;
            document.getElementById('cSz').innerText = o.size;
            document.getElementById('cDate').innerText = o.date;
            document.getElementById('cSpecs').innerText = o.specs;
            document.getElementById('cImgs').innerHTML = o.images.map(img => `<img src="${img}" style="height:120px;">`).join('');

            html2canvas(document.querySelector("#formCanvas")).then(canvas => {
                const imgData = canvas.toDataURL("image/jpeg");
                const link = document.createElement('a');
                link.download = `Order_${o.id}.jpg`;
                link.href = imgData;
                link.click();
                alert("Order Image Downloaded! Now share this file to WhatsApp.");
            });
        });
    }
</script>
</body>
</html>
