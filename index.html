<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Orders</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding-bottom: 90px; }
        .header { background: #8B735B; color: white; text-align: center; padding: 15px; position: sticky; top: 0; z-index: 100; font-weight: bold; }
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #888; font-size: 12px; font-weight: 600; }
        .tab.active { color: #D4AF37; border-top: 4px solid #D4AF37; background: #fffcf5; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .photo-box { width: 100%; height: 150px; border: 2px dashed #D4AF37; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: #FFFDF5; overflow: hidden; }
        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* List View */
        .order-item { background: white; border-radius: 12px; padding: 10px; margin-bottom: 10px; display: flex; gap: 12px; border-left: 5px solid #D4AF37; cursor: pointer; }
        .order-item img { width: 70px; height: 70px; border-radius: 8px; object-fit: cover; }
        .order-info { flex: 1; }
        .order-info h3 { margin: 0; font-size: 15px; }
        .order-info p { margin: 2px 0; font-size: 12px; color: #666; }

        /* --- BIG SCREEN POPUP --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; width: 90%; border-radius: 20px; padding: 20px; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 15px; font-size: 24px; font-weight: bold; color: #888; }
        .big-img { width: 100%; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .detail-row { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
        .detail-label { color: #8B735B; font-weight: bold; font-size: 13px; }
        .detail-val { font-weight: bold; font-size: 15px; }
        .specs-box { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 10px; border-left: 4px solid #D4AF37; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .save-btn { background: #D4AF37; width: 100%; padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="header" id="headerTitle">Add New Order</div>

<!-- PAGE: ADD -->
<div id="addPage" class="page active">
    <div class="card">
        <div class="photo-box" onclick="document.getElementById('cam').click()">
            <span id="pText">📸 ADD PHOTO</span>
            <img id="preview">
        </div>
        <input type="file" id="cam" accept="image/*" style="display:none" onchange="loadAndCompress(event)">
        <input type="text" id="orderId" placeholder="Bill Number">
        <input type="text" id="party" placeholder="Party Name">
        <div style="display:flex; gap:10px;">
            <input type="text" id="karat" placeholder="Karat">
            <input type="text" id="weight" placeholder="Weight">
        </div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="size" placeholder="Size">
            <input type="date" id="date">
        </div>
        <textarea id="specs" rows="3" placeholder="Specifications..."></textarea>
        <button class="save-btn" id="saveBtn" onclick="saveOrder()">SAVE TO CLOUD</button>
    </div>
</div>

<!-- PAGE: PENDING -->
<div id="listPage" class="page">
    <input type="text" id="searchAll" placeholder="🔍 Search Name or ID..." onkeyup="renderOrders()">
    <div id="allOrderList" style="margin-top:15px;"></div>
</div>

<!-- BIG SCREEN MODAL -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modalImg" class="big-img">
        <h2 id="modalTitle" style="margin:0 0 15px 0; color:#8B735B;"></h2>
        
        <div class="detail-row"><span class="detail-label">Karat:</span><span id="modalKarat" class="detail-val"></span></div>
        <div class="detail-row"><span class="detail-label">Weight:</span><span id="modalWeight" class="detail-val"></span></div>
        <div class="detail-row"><span class="detail-label">Size:</span><span id="modalSize" class="detail-val"></span></div>
        <div class="detail-row"><span class="detail-label">Delivery:</span><span id="modalDate" class="detail-val" style="color:red;"></span></div>
        
        <div class="detail-label" style="margin-top:15px;">Specifications:</div>
        <div id="modalSpecs" class="specs-box"></div>

        <div class="btn-group">
            <button class="action-btn" style="background:#4CAF50;" id="deliverBtn">MARK DELIVERED</button>
            <button class="action-btn" style="background:#2196F3;" onclick="copyOrder()">COPY TEXT</button>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="switchTab('add', this)"><span>✚</span>NEW</div>
    <div class="tab" onclick="switchTab('list', this)"><span>📋</span>PENDING</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        storageBucket: "shanti-jewel-order.firebasestorage.app",
        messagingSenderId: "382209058715",
        appId: "1:382209058715:web:44566a9efb13c452ad633e",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let imgData = "";
    let currentOpenOrder = null;

    function switchTab(tab, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        document.getElementById(tab + 'Page').classList.add('active');
        if(tab === 'list') renderOrders();
    }

    function loadAndCompress(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = img.height * (400 / img.width);
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                imgData = canvas.toDataURL('image/jpeg', 0.6);
                document.getElementById('preview').src = imgData;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('pText').style.display = 'none';
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    }

    function saveOrder() {
        const id = document.getElementById('orderId').value;
        const party = document.getElementById('party').value;
        const saveBtn = document.getElementById('saveBtn');
        if(!id || !party) return alert("Enter ID and Name!");
        
        saveBtn.disabled = true;
        saveBtn.innerText = "SAVING...";

        const order = {
            id, party, karat: document.getElementById('karat').value,
            weight: document.getElementById('weight').value,
            size: document.getElementById('size').value,
            delivery: document.getElementById('date').value,
            specs: document.getElementById('specs').value,
            photo: imgData
        };

        db.ref('orders/' + id).set(order).then(() => {
            alert("Order Saved!");
            location.reload();
        });
    }

    function openModal(o) {
        currentOpenOrder = o;
        document.getElementById('modalImg').src = o.photo || '';
        document.getElementById('modalTitle').innerText = "#" + o.id + " - " + o.party;
        document.getElementById('modalKarat').innerText = o.karat || '-';
        document.getElementById('modalWeight').innerText = o.weight || '-';
        document.getElementById('modalSize').innerText = o.size || '-';
        document.getElementById('modalDate').innerText = o.delivery || '-';
        document.getElementById('modalSpecs').innerText = o.specs || 'No specific details';
        document.getElementById('deliverBtn').onclick = () => {
            if(confirm("Deliver order?")) {
                db.ref('orders/' + o.id).remove();
                closeModal();
            }
        };
        document.getElementById('orderModal').style.display = "block";
    }

    function closeModal() { document.getElementById('orderModal').style.display = "none"; }

    function renderOrders() {
        const search = document.getElementById('searchAll').value.toLowerCase();
        db.ref('orders').on('value', (snap) => {
            const list = document.getElementById('allOrderList');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) return;

            Object.values(data).forEach(o => {
                if(o.party.toLowerCase().includes(search) || o.id.includes(search)) {
                    const item = document.createElement('div');
                    item.className = 'order-item';
                    item.onclick = () => openModal(o);
                    item.innerHTML = `
                        <img src="${o.photo || 'https://via.placeholder.com/70'}">
                        <div class="order-info">
                            <h3>#${o.id} | ${o.party}</h3>
                            <p>Wt: ${o.weight} | Karat: ${o.karat}</p>
                            <p style="color:red; font-weight:bold;">Due: ${o.delivery}</p>
                        </div>
                    `;
                    list.appendChild(item);
                }
            });
        });
    }

    function copyOrder() {
        const o = currentOpenOrder;
        const text = `SHANTI JEWELS\nOrder: #${o.id}\nParty: ${o.party}\nWeight: ${o.weight}\nSize: ${o.size}\nDelivery: ${o.delivery}\nSpecs: ${o.specs}`;
        navigator.clipboard.writeText(text);
        alert("Order details copied to clipboard!");
    }

    window.onload = renderOrders;
</script>
</body>
</html>
