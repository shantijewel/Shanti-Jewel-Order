<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shanti Jewel Order Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #5d4037; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; color: #333; }
        .header { background: var(--brown); color: white; text-align: center; padding: 15px; border-bottom: 3px solid var(--gold); }
        .logo-text { font-size: 24px; font-weight: bold; letter-spacing: 2px; margin: 0; }
        .sub-header { font-size: 12px; letter-spacing: 4px; color: var(--gold); }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eee; }
        
        /* 4-Slot Photo Grid */
        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .photo-box { border: 2px dashed var(--gold); height: 100px; display: flex; align-items: center; justify-content: center; border-radius: 8px; overflow: hidden; background: #fafafa; font-size: 12px; color: var(--brown); font-weight: bold; position: relative; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background: white; }
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn-gold { background: var(--gold); color: white; }
        .btn-out { background: none; border: 1px solid var(--gold); color: var(--gold); margin-top: 8px; font-size: 12px; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; z-index: 1000; }
        .tab { flex: 1; text-align: center; padding: 25px 2px; font-size: 9px; color: #999; font-weight: bold; text-transform: uppercase; line-height: 1.2; display: flex; align-items: center; justify-content: center; }
        .tab.active { color: var(--brown); border-top: 4px solid var(--brown); background: #fffcf5; }

        /* Canvas (Hidden) */
        #formCanvas { background: white; width: 600px; height: 850px; padding: 25px; position: fixed; left: -5000px; border: 15px solid var(--gold); box-sizing: border-box; }
        .canvas-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .canvas-grid img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">SHANTI JEWEL</div>
    <div class="sub-header">ORDER PORTAL</div>
</div>

<!-- ADD ORDER PAGE -->
<div id="addPage" class="page active">
    <div class="card">
        <div class="photo-grid">
            <div class="photo-box" id="p1" onclick="document.getElementById('f1').click()">+ PHOTO 1</div>
            <div class="photo-box" id="p2" onclick="document.getElementById('f2').click()">+ PHOTO 2</div>
            <div class="photo-box" id="p3" onclick="document.getElementById('f3').click()">+ PHOTO 3</div>
            <div class="photo-box" id="p4" onclick="document.getElementById('f4').click()">+ PHOTO 4</div>
        </div>

        <input type="file" id="f1" accept="image/*" style="display:none" onchange="handleSingle(this, 'p1', 0)">
        <input type="file" id="f2" accept="image/*" style="display:none" onchange="handleSingle(this, 'p2', 1)">
        <input type="file" id="f3" accept="image/*" style="display:none" onchange="handleSingle(this, 'p3', 2)">
        <input type="file" id="f4" accept="image/*" style="display:none" onchange="handleSingle(this, 'p4', 3)">

        <input type="text" id="i_id" placeholder="Order Number">
        <select id="i_pa">
            <option value="">Select Party Name</option>
            <option value="P.N.GADGIL & SONS LTD.">P.N.GADGIL & SONS LTD.</option>
            <option value="PNG BROTHERS">PNG BROTHERS</option>
            <option value="ANNAPURNA GOLD">ANNAPURNA GOLD</option>
            <option value="NEELKANTH JEWELLERS">NEELKANTH JEWELLERS</option>
            <option value="INHOUSE">INHOUSE</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="number" step="0.001" id="i_wt" placeholder="Weight (gms)">
            <input type="number" id="i_sz" placeholder="Size (NO.)">
        </div>
        <input type="date" id="i_dd">
        <select id="i_cad">
            <option value="">Select CAD Worker</option>
            <option value="DYE">DYE</option>
            <option value="CHETAN SHINDE">CHETAN SHINDE</option>
            <option value="ALAUDDIN">ALAUDDIN</option>
        </select>
        <textarea id="i_sp" rows="3" placeholder="Production Instructions"></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">PROCESS ORDER</button>
    </div>
</div>

<div id="listPage" class="page"><div id="mainList"></div></div>
<div id="infoPage" class="page"><div id="currentInfoList"></div></div>
<div id="pastPage" class="page"><div id="pastList"></div></div>

<!-- FORM CANVAS FOR DOWNLOAD -->
<div id="formCanvas">
    <div style="text-align:center; border-bottom:5px solid #5d4037; padding-bottom:15px; margin-bottom:15px;">
        <div style="font-size: 50px; font-weight: bold; color: #5d4037;">SHANTI JEWEL</div>
    </div>
    <div id="c_imgs" class="canvas-grid"></div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:24px; border-top:2px solid #eee; padding-top:15px;">
        <div><b>CAD:</b> <span id="c_cad"></span></div>
        <div><b>WT:</b> <span id="c_wt"></span></div>
        <div style="grid-column: span 2;"><b>SIZE:</b> <span id="c_sz"></span></div>
    </div>
    <div style="margin-top:20px; border:1px solid #ddd; padding:15px; border-radius:8px; background:#f9f9f9; font-size:22px;">
        <b>NOTES:</b><br><span id="c_sp"></span>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">PUNCH</div>
    <div class="tab" onclick="nav('list', this)">PRODUCTION</div>
    <div class="tab" onclick="nav('info', this)">CURRENT</div>
    <div class="tab" onclick="nav('past', this)">PAST</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const depts = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];
    let photoData = [null, null, null, null];

    async function handleSingle(input, previewId, index) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const max = 600;
                let w = img.width, h = img.height;
                if (w > h) { if (w > max) { h *= max/w; w = max; } } else { if (h > max) { w *= max/h; h = max; } }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                const optimized = canvas.toDataURL("image/jpeg", 0.5);
                photoData[index] = optimized;
                document.getElementById(previewId).innerHTML = `<img src="${optimized}">`;
            };
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveOrder() {
        const id = document.getElementById('i_id').value;
        const validPhotos = photoData.filter(p => p !== null);
        if(!id || validPhotos.length === 0) return alert("Order ID and at least 1 Photo required");
        
        db.ref('orders/' + id).set({
            id: id, party: document.getElementById('i_pa').value || "-",
            weight: document.getElementById('i_wt').value + "gms",
            size: document.getElementById('i_sz').value + "NO.",
            dueDate: document.getElementById('i_dd').value || "9999-12-31",
            cadWorker: document.getElementById('i_cad').value || "-",
            specs: document.getElementById('i_sp').value || "None",
            imgs: validPhotos, status: "CAD", ts: Date.now()
        }).then(() => { alert("Order Saved!"); location.reload(); });
    }

    function nav(p, el) {
        document.querySelectorAll('.page, .tab').forEach(x => x.classList.remove('active'));
        document.getElementById(p + 'Page').classList.add('active');
        el.classList.add('active');
        if(p !== 'add') loadOrders();
    }

    function loadOrders() {
        db.ref('orders').on('value', s => {
            const data = Object.values(s.val() || {}).sort((a,b) => b.ts - a.ts);
            const sList = document.getElementById('mainList'), cList = document.getElementById('currentInfoList'), pList = document.getElementById('pastList');
            sList.innerHTML = ""; cList.innerHTML = ""; pList.innerHTML = "";
            
            data.forEach(o => {
                const cur = o.status || "CAD";
                const card = `<div class="card"><div style="display:flex; gap:12px;"><img src="${o.imgs[0]}" style="width:70px; height:70px; object-fit:cover; border-radius:8px;"><div><b>${o.id}</b> - ${o.party}</div></div><button class="btn btn-out" onclick="moveNext('${o.id}', '${cur}')">MOVE TO NEXT STAGE</button><button class="btn btn-out" style="color:green; border-color:green;" onclick="downloadForm('${o.id}')">DOWNLOAD FORM</button></div>`;
                if(cur !== "READY") sList.innerHTML += card;
                else pList.innerHTML += card;
            });
            window.activeData = data;
        });
    }

    function moveNext(id, cur) {
        const idx = depts.indexOf(cur);
        if(idx < depts.length - 1) db.ref('orders/' + id).update({ status: depts[idx + 1], ts: Date.now() });
    }

    function downloadForm(id) {
        const o = window.activeData.find(x => x.id === id);
        if(!o) return;
        document.getElementById('c_cad').innerText = o.cadWorker;
        document.getElementById('c_wt').innerText = o.weight;
        document.getElementById('c_sz').innerText = o.size;
        document.getElementById('c_sp').innerText = o.specs;
        document.getElementById('c_imgs').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');
        
        setTimeout(() => {
            html2canvas(document.querySelector("#formCanvas"), { scale: 2 }).then(canvas => {
                const img = canvas.toDataURL("image/jpeg", 0.9);
                const w = window.open();
                w.document.write(`<img src="${img}" style="width:100%;">`);
            });
        }, 500);
    }
</script>
</body>
</html>
