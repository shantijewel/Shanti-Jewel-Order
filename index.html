<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHANTI JEWEL ORDER PORTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --gold: #D4AF37; --brown: #4e342e; --red: #d32f2f; --bg: #fdfdfd; }
        body { font-family: 'Arial', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        /* Main App Header */
        .header { background: var(--brown); color: white; text-align: center; padding: 20px; font-weight: bold; border-bottom: 4px solid var(--gold); }
        .logo-text { font-size: 24px; letter-spacing: 2px; margin: 0; }
        .sub-text { font-size: 10px; opacity: 0.8; letter-spacing: 1px; }

        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }
        
        /* THE RED ORDER FORM (ENLARGED) */
        #cadCanvas { background: white; width: 600px; padding: 40px; position: fixed; left: -9999px; border: 20px solid var(--red); color: var(--red); }
        .cad-header { text-align: center; border-bottom: 5px solid var(--red); padding-bottom: 15px; margin-bottom: 30px; }
        .cad-imgs { display: flex; flex-direction: column; gap: 15px; align-items: center; margin: 30px 0; }
        .cad-imgs img { width: 90%; height: auto; border: 3px solid var(--red); border-radius: 10px; }
        .cad-data { font-size: 28px; font-weight: bold; line-height: 1.5; }
        .instruction-box { margin-top: 25px; border-top: 4px solid var(--red); padding-top: 15px; font-size: 26px; }

        /* Inputs */
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .btn { padding: 18px; border: none; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: white; text-transform: uppercase; }
        .btn-red { background: var(--red); color: white; }
        
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 2px solid #ddd; height: 75px; }
        .tab { flex: 1; text-align: center; padding: 15px; font-size: 13px; font-weight: bold; color: #aaa; }
        .tab.active { color: var(--brown); border-top: 5px solid var(--brown); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-text">SHANTI JEWEL</div>
    <div class="sub-text">ORDER PORTAL</div>
</div>

<div id="addPage" class="page active">
    <div class="card">
        <h2 id="nextIdLabel" style="color:var(--red); text-align:center; margin:0;">ID: #...</h2>
        <div style="border:2px dashed var(--gold); padding:25px; text-align:center; margin-top:15px; border-radius:10px;" onclick="document.getElementById('fileIn').click()">
            <span id="upMsg" style="font-weight:bold;">📸 CLICK TO UPLOAD DESIGN</span>
            <div id="previews" style="display:flex; gap:10px; justify-content:center; margin-top:15px;"></div>
        </div>
        <input type="file" id="fileIn" multiple accept="image/*" style="display:none" onchange="previewImages(event)">
        
        <input type="text" id="party" placeholder="Customer Name (Private)">
        <div style="display:flex; gap:10px;">
            <input type="text" id="weight" placeholder="Weight (g)">
            <input type="text" id="size" placeholder="Size">
        </div>
        <input type="date" id="delDate" title="Internal Delivery Date">
        <textarea id="specs" rows="4" placeholder="Instructions for CAD worker..."></textarea>
        <button class="btn btn-gold" onclick="saveOrder()">PUNCH ORDER</button>
    </div>
</div>

<div id="statusPage" class="page">
    <div id="statusList"></div>
</div>

<div id="infoPage" class="page">
    <div id="infoList"></div>
</div>

<!-- RED ORDER FORM FOR CAD -->
<div id="cadCanvas">
    <div class="cad-header">
        <h1 style="font-size:60px; margin:0;">SHANTI JEWEL</h1>
        <p style="letter-spacing:12px; font-size:22px; margin:5px 0; font-weight:bold;">ORDER FORM</p>
    </div>
    <div id="cadImgBox" class="cad-imgs"></div>
    <div class="cad-data">
        <div style="font-size:45px; border-bottom: 4px solid var(--red); display:inline-block; margin-bottom:15px;">
            ORDER ID: #<span id="cId"></span>
        </div><br>
        <b>WEIGHT:</b> <span id="cWt"></span>g<br>
        <b>SIZE:</b> <span id="cSz"></span>
        <div class="instruction-box">
            <b>INSTRUCTIONS:</b><br>
            <span id="cSpecs" style="font-weight:normal;"></span>
        </div>
    </div>
</div>

<div class="tab-bar">
    <div class="tab active" onclick="nav('add', this)">NEW</div>
    <div class="tab" onclick="nav('status', this)">WORKFLOW</div>
    <div class="tab" onclick="nav('info', this)">ARCHIVE</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnvmQBPkJmJcjXf71vEUY91B2_2P9oAgU",
        authDomain: "shanti-jewel-order.firebaseapp.com",
        projectId: "shanti-jewel-order",
        databaseURL: "https://shanti-jewel-order-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let currentImgs = [];
    let nextNum = 100;
    const stages = ["CAD", "CAM", "CASTING", "POLISH", "HUID", "READY"];

    function getNextId() {
        db.ref('orders').limitToLast(1).once('value', (snap) => {
            if (snap.exists()) {
                const lastVal = Object.values(snap.val())[0];
                const lastId = parseInt(lastVal.id);
                nextNum = isNaN(lastId) ? 100 : lastId + 1;
            } else {
                nextNum = 100;
            }
            document.getElementById('nextIdLabel').innerText = "ID: #" + nextNum;
        });
    }
    getNextId();

    function previewImages(e) {
        const files = Array.from(e.target.files).slice(0, 3);
        currentImgs = [];
        const container = document.getElementById('previews');
        container.innerHTML = "";
        files.forEach(f => {
            const reader = new FileReader();
            reader.onload = (rs) => {
                currentImgs.push(rs.target.result);
                container.innerHTML += `<img src="${rs.target.result}" style="width:60px; height:60px; border-radius:8px; object-fit:cover; border:1px solid var(--gold);">`;
            };
            reader.readAsDataURL(f);
        });
        document.getElementById('upMsg').innerText = files.length + " PHOTO(S) ADDED";
    }

    function nav(page, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(page + 'Page').classList.add('active');
        el.classList.add('active');
        if(page !== 'add') render();
    }

    function saveOrder() {
        const p = document.getElementById('party').value;
        if(!p || currentImgs.length === 0) return alert("Add Party & Images");
        const idStr = nextNum.toString();
        db.ref('orders/' + idStr).set({
            id: idStr, party: p,
            weight: document.getElementById('weight').value,
            size: document.getElementById('size').value,
            date: document.getElementById('delDate').value,
            specs: document.getElementById('specs').value,
            imgs: currentImgs,
            status: "CAD"
        }).then(() => { alert("Punched!"); location.reload(); });
    }

    function render() {
        db.ref('orders').on('value', (snap) => {
            const data = snap.val();
            const sList = document.getElementById('statusList');
            const iList = document.getElementById('infoList');
            sList.innerHTML = ""; iList.innerHTML = "";
            if(!data) return;

            Object.values(data).reverse().forEach(o => {
                let arrows = stages.map(s => `<div style="font-size:10px; background:${o.status===s? 'var(--gold)':'#eee'}; color:${o.status===s? 'white':'#999'}; padding:4px 6px; border-radius:4px;">${s}</div>`).join('→');
                
                sList.innerHTML += `<div class="card">
                    <b style="font-size:18px;">#${o.id} | ${o.party}</b>
                    <div style="display:flex; gap:4px; margin:15px 0; align-items:center;">${arrows}</div>
                    <button class="btn btn-red" onclick="downloadForm('${o.id}')">GET ORDER FORM</button>
                    <button class="btn btn-gold" style="background:#444;" onclick="move('${o.id}', '${o.status}')">NEXT DEPT ➔</button>
                </div>`;

                iList.innerHTML += `<div class="card">
                    <h3>#${o.id} - ${o.party}</h3>
                    <p><b>Wt:</b> ${o.weight}g | <b>Size:</b> ${o.size} | <b>Due:</b> ${o.date}</p>
                    <div style="display:flex; gap:10px; overflow-x:auto; margin-top:10px;">
                        ${o.imgs.map(img => `<img src="${img}" style="height:120px; border-radius:10px;">`).join('')}
                    </div>
                </div>`;
            });
        });
    }

    function move(id, curr) {
        const idx = stages.indexOf(curr) + 1;
        if(idx >= stages.length) return alert("Finished");
        if(confirm("Move to " + stages[idx] + "?")) {
            db.ref('orders/' + id).update({status: stages[idx]});
        }
    }

    function downloadForm(id) {
        db.ref('orders/' + id).once('value', (snap) => {
            const o = snap.val();
            document.getElementById('cId').innerText = o.id;
            document.getElementById('cWt').innerText = o.weight;
            document.getElementById('cSz').innerText = o.size;
            document.getElementById('cSpecs').innerText = o.specs;
            document.getElementById('cadImgBox').innerHTML = o.imgs.map(i => `<img src="${i}">`).join('');

            html2canvas(document.querySelector("#cadCanvas"), { scale: 1.5, useCORS: true }).then(canvas => {
                const link = document.createElement('a');
                link.download = `SJ_Order_${o.id}.jpg`;
                link.href = canvas.toDataURL("image/jpeg", 1.0);
                link.click();
            });
        });
    }
</script>
</body>
</html>
